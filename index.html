                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}><div><div style={{ fontWeight: 600, fontSize: "1.0625rem" }}>{selectedTemplateData.title}</div><div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", display: "flex", alignItems: "center", gap: 6, marginTop: 4 }}>{Icon.clock} {selectedTemplateData.duration} {t.timeEstimate}</div></div></div>
                  <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", marginBottom: 10 }}>{t.topicsIncluded}</div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{selectedTemplateData.topics.map((topic, i) => (<div key={i} className="template-topic"><div className="template-topic-num">{i + 1}</div><span style={{ flex: 1 }}>{topic.title}</span></div>))}</div>
                </div>
              )}
              <div style={{ display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}><button onClick={() => onStart(selectedTemplate)} className="btn btn-primary btn-large">{t.startSession} {Icon.arrow}</button><button onClick={() => fileRef.current?.click()} className="btn btn-secondary">{Icon.upload} {t.importSession}</button></div>
            </div>
          </section>
          {history.length > 0 && (<section style={{ padding: "36px 20px 48px" }}><div style={{ maxWidth: 520, margin: "0 auto" }}><h2 style={{ fontSize: "0.875rem", fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.03em", marginBottom: 14, textAlign: "center" }}>{t.recentSessions}</h2><div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{history.slice(0, 4).map(s => (<div key={s.id} className="session-card" onClick={() => onOpenSession(s)}><div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 12 }}><div style={{ minWidth: 0 }}><div style={{ fontWeight: 600, fontSize: "1rem", marginBottom: 2, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{s.title || t.untitledSession}</div><div style={{ fontSize: "0.875rem", color: "var(--text-muted)" }}>{formatDate(s.date)} · {s.topics?.length || 0} {t.topics}</div></div><div style={{ color: "var(--text-muted)" }}>{Icon.arrow}</div></div></div>))}</div></div></section>)}
          <section style={{ padding: "56px 20px", background: "var(--bg-dark)", color: "var(--text-on-dark)", textAlign: "center" }}><div style={{ maxWidth: 480, margin: "0 auto" }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 14 }}>{t.readyToFacilitate}</h2><p style={{ fontSize: "1rem", opacity: 0.8, marginBottom: 24, lineHeight: 1.5 }}>{t.readyToFacilitateDesc}</p><button onClick={() => onStart(selectedTemplate)} className="btn btn-large" style={{ background: "white", color: "var(--text)" }}>{t.startSession} {Icon.arrow}</button></div></section>
          <footer style={{ padding: "32px 20px", borderTop: "1px solid var(--border-light)" }}><div style={{ maxWidth: 520, margin: "0 auto", textAlign: "center" }}><p style={{ color: "var(--text-secondary)", fontSize: "0.9375rem", marginBottom: 8 }}>{t.madeFor}</p><p style={{ color: "var(--text-muted)", fontSize: "0.8125rem" }}>{t.dataLocal}</p></div></footer>
        </div>
      );
    };

    // =============================================
    // MODALS
    // =============================================
    const HelpModal = ({ onClose }) => {
      const { t } = useLang();
      const steps = [{ n: 1, title: t.setup, desc: t.setupDesc }, { n: 2, title: t.agenda, desc: t.agendaDesc }, { n: 3, title: t.session, desc: t.sessionDesc }, { n: 4, title: t.commitments, desc: t.commitmentsDesc }];
      return (
        <div className="animate-fade no-print" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }} onClick={onClose}>
          <div className="card animate-scale" style={{ maxWidth: 440, width: "100%", padding: 24 }} onClick={e => e.stopPropagation()}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}><h2 className="font-serif" style={{ fontSize: "1.375rem" }}>{t.howThisWorks}</h2><button onClick={onClose} className="btn btn-ghost btn-icon">{Icon.x}</button></div>
            <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>{steps.map(s => (<div key={s.n} style={{ display: "flex", gap: 14 }}><div style={{ width: 28, height: 28, borderRadius: "50%", background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 600, fontSize: "0.875rem", flexShrink: 0 }}>{s.n}</div><div><div style={{ fontWeight: 600, marginBottom: 3, fontSize: "1rem" }}>{s.title}</div><div style={{ color: "var(--text-secondary)", fontSize: "0.9375rem" }}>{s.desc}</div></div></div>))}</div>
            <button onClick={onClose} className="btn btn-primary" style={{ width: "100%", marginTop: 20 }}>{t.gotIt}</button>
          </div>
        </div>
      );
    };

    const PauseModal = ({ onContinue, onBack, isLast, onSkipChange }) => {
      const { t } = useLang();
      const [skipChecked, setSkipChecked] = useState(false);
      const handleContinue = () => { if (skipChecked) { saveSkipPause(true); onSkipChange(true); } onContinue(); };
      return (
        <div className="animate-fade no-print" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div className="card animate-scale" style={{ maxWidth: 380, width: "100%", padding: 24, textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: "var(--accent-soft)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: "1.125rem" }}>◐</div>
            <h2 className="font-serif" style={{ fontSize: "1.25rem", marginBottom: 10 }}>{t.beforeWeMove}</h2>
            <p style={{ color: "var(--text-secondary)", marginBottom: 20, fontSize: "1rem" }}>{t.everyoneClear}<br />{t.capturedAgreed}</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}><button onClick={handleContinue} className="btn btn-primary" style={{ width: "100%" }}>{isLast ? t.yesSeeCommitments : t.yesNextTopic}</button><button onClick={onBack} className="btn btn-secondary" style={{ width: "100%" }}>{t.keepDiscussing}</button></div>
            <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginTop: 18, cursor: "pointer", fontSize: "0.875rem", color: "var(--text-muted)", minHeight: "var(--touch-target)" }}><input type="checkbox" checked={skipChecked} onChange={e => setSkipChecked(e.target.checked)} style={{ width: 20, height: 20 }} />{t.skipNextTime}</label>
          </div>
        </div>
      );
    };

    const PhaseNav = ({ phase, setPhase, canEnterRoom }) => {
      const { t } = useLang();
      const phases = [{ id: "setup", label: t.setup }, { id: "agenda", label: t.agenda }, { id: "room", label: t.session }, { id: "review", label: t.commitments }];
      const currentIndex = phases.findIndex(p => p.id === phase);
      return (
        <div className="desktop-only" style={{ display: "flex", alignItems: "center", gap: 4, background: "var(--bg-secondary)", padding: 4, borderRadius: "var(--radius)" }}>
          {phases.map((p, i) => { const isActive = p.id === phase, isPast = i < currentIndex, isDisabled = p.id === "room" && !canEnterRoom; return <button key={p.id} onClick={() => !isDisabled && setPhase(p.id)} disabled={isDisabled} className="btn" style={{ padding: "12px 18px", fontSize: "0.9375rem", fontWeight: isActive ? 600 : 500, borderRadius: 8, background: isActive ? "var(--bg-card)" : "transparent", color: isActive ? "var(--text)" : isPast ? "var(--text-secondary)" : "var(--text-muted)", boxShadow: isActive ? "var(--shadow-sm)" : "none", minHeight: 44 }}>{p.label}</button>; })}
        </div>
      );
    };

    // =============================================
    // SETUP PHASE (with participants)
    // =============================================
    const SetupPhase = ({ session, update, onDeleteParticipant }) => {
      const { t } = useLang();
      const [showTip, setShowTip] = useState(false);
      const [newParticipant, setNewParticipant] = useState("");
      
      const addParticipant = () => {
        const name = newParticipant.trim();
        if (!name) return;
        const participants = [...(session.participants || []), { id: Date.now(), name, present: true }];
        update({ ...session, participants });
        setNewParticipant("");
      };
      
      return (
        <div className="animate-in" style={{ maxWidth: 560, margin: "0 auto" }}>
          <div className="card" style={{ padding: 24, marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 10, textTransform: "uppercase" }}>{t.meetingTitle}</label>
            <AutoTextarea value={session.title} onChange={e => update({ ...session, title: e.target.value })} placeholder={t.meetingTitlePlaceholder} className="font-serif" style={{ fontSize: "1.5rem", padding: 0, lineHeight: 1.3 }} autoFocus />
          </div>
          <div className="card" style={{ padding: 24, marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 10 }}><label style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", textTransform: "uppercase" }}>{t.whatToLeaveWith}</label><TipBox text={t.tipSetup} show={showTip} onToggle={() => setShowTip(!showTip)} /></div>
            <AutoTextarea value={session.intention} onChange={e => update({ ...session, intention: e.target.value })} placeholder={t.intentionPlaceholder} style={{ fontSize: "1.125rem", padding: 0 }} />
            <p style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 10 }}>{t.intentionHelp}</p>
          </div>
          <div className="card" style={{ padding: 24, marginBottom: 14 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }} className="mobile-grid-1">
              <div><label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.meetingDate}</label><input type="date" value={session.date} onChange={e => update({ ...session, date: e.target.value })} className="input" /></div>
              <div><label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.time}</label><input type="time" value={session.time} onChange={e => update({ ...session, time: e.target.value })} className="input" /></div>
            </div>
            <div style={{ marginBottom: 14 }}><label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.duration}</label><select value={session.duration} onChange={e => update({ ...session, duration: e.target.value })} className="input" style={{ width: "100%" }}><option value="15">15 minutes</option><option value="30">30 minutes</option><option value="45">45 minutes</option><option value="60">1 hour</option><option value="90">1.5 hours</option><option value="120">2 hours</option></select></div>
            <div><label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.facilitator}</label><input value={session.facilitator} onChange={e => update({ ...session, facilitator: e.target.value })} placeholder={t.facilitatorPlaceholder} className="input" /></div>
          </div>
          {/* Participants section */}
          <div className="card" style={{ padding: 24 }}>
            <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.expectedParticipants}</label>
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input value={newParticipant} onChange={e => setNewParticipant(e.target.value)} placeholder={t.expectedParticipantsPlaceholder} className="input" style={{ flex: 1 }} onKeyDown={e => e.key === "Enter" && addParticipant()} />
              <button onClick={addParticipant} disabled={!newParticipant.trim()} className="btn btn-secondary">{Icon.plus}</button>
            </div>
            {session.participants?.length > 0 ? (
              <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                {session.participants.map(p => (
                  <div key={p.id} className="participant-chip">
                    {Icon.user}
                    <span>{p.name}</span>
                    <button onClick={() => onDeleteParticipant(p.id)} style={{ background: "none", border: "none", cursor: "pointer", padding: 2, display: "flex", opacity: 0.5 }}>{Icon.x}</button>
                  </div>
                ))}
              </div>
            ) : <p style={{ fontSize: "0.8125rem", color: "var(--text-muted)" }}>{t.expectedParticipantsHelp}</p>}
          </div>
        </div>
      );
    };

    // =============================================
    // AGENDA PHASE
    // =============================================
    const AgendaPhase = ({ session, update, onDeleteTopic }) => {
      const { t } = useLang();
      const [copied, setCopied] = useState(false);
      const [showTip, setShowTip] = useState(false);
      const updateTopic = (i, changes) => { const topics = [...session.topics]; topics[i] = { ...topics[i], ...changes }; update({ ...session, topics }); };
      const addTopic = () => update({ ...session, topics: [...session.topics, { id: Date.now(), title: "", notes: "", commitments: [] }] });
      const moveTopic = (i, dir) => { const j = i + dir; if (j < 0 || j >= session.topics.length) return; const topics = [...session.topics]; [topics[i], topics[j]] = [topics[j], topics[i]]; update({ ...session, topics }); };
      const copyAgenda = async () => {
        let s = `${session.title}\n${session.date} | ${session.time} to ${calcEndTime(session.time, session.duration)}\n`;
        if (session.facilitator) s += `${t.facilitator}: ${session.facilitator}\n`;
        if (session.participants?.length > 0) s += `${t.attendees}: ${session.participants.map(p => p.name).join(", ")}\n`;
        if (session.intention) s += `\n${t.goal}: ${session.intention}\n`;
        s += `\n${t.agenda.toUpperCase()}\n`;
        session.topics.forEach((x, i) => { if (x.title.trim()) s += `${i + 1}. ${x.title}\n`; });
        try { await navigator.clipboard.writeText(s); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
      };

      return (
        <div className="animate-in" style={{ maxWidth: 560, margin: "0 auto" }}>
          <div style={{ marginBottom: 18 }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 6 }}>{session.title || t.untitledSession}</h2><p style={{ color: "var(--text-muted)", fontSize: "0.9375rem" }}>{session.date} · {session.time} to {calcEndTime(session.time, session.duration)}{session.participants?.length > 0 && ` · ${session.participants.length} ${t.attendees.toLowerCase()}`}</p></div>
          {session.intention && <div className="intention-banner" style={{ marginBottom: 18 }}><span style={{ color: "var(--blue-text)" }}>{Icon.target}</span><span style={{ fontSize: "0.9375rem", color: "var(--text-secondary)" }}><strong>{t.goal}:</strong> {session.intention}</span></div>}
          {showTip && <div style={{ marginBottom: 14 }}><TipBox text={t.tipAgenda} show={showTip} onToggle={() => setShowTip(false)} /></div>}
          <div className="card" style={{ padding: 20, marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 10, flexWrap: "wrap" }}><label style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", textTransform: "uppercase" }}>{t.agenda}</label><div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}><TipBox text={t.tipAgenda} show={false} onToggle={() => setShowTip(!showTip)} /><button onClick={copyAgenda} className="btn btn-ghost btn-small">{copied ? Icon.check : Icon.copy} {copied ? t.agendaCopied : t.copyAgenda}</button></div></div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
              {session.topics.map((topic, i) => (
                <div key={topic.id} className="topic-row">
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.75rem", fontWeight: 600, flexShrink: 0 }}>{i + 1}</div>
                  <input value={topic.title} onChange={e => updateTopic(i, { title: e.target.value })} placeholder={t.topicPlaceholder} style={{ flex: 1, fontSize: "1rem", border: "none", outline: "none", background: "transparent", fontFamily: "inherit", minWidth: 0, minHeight: 28 }} />
                  <div className="reorder-btns desktop-only" style={{ display: "flex", gap: 2 }}><button onClick={() => moveTopic(i, -1)} disabled={i === 0} className="btn btn-ghost btn-icon">{Icon.up}</button><button onClick={() => moveTopic(i, 1)} disabled={i === session.topics.length - 1} className="btn btn-ghost btn-icon">{Icon.down}</button></div>
                  {session.topics.length > 1 && <button onClick={() => onDeleteTopic(i)} className="btn btn-ghost btn-icon" style={{ opacity: 0.4 }}>{Icon.x}</button>}
                </div>
              ))}
            </div>
            <button onClick={addTopic} className="btn btn-ghost" style={{ width: "100%", justifyContent: "center" }}>{Icon.plus} {t.addTopic}</button>
          </div>
          <div className="card" style={{ padding: 18, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14, flexWrap: "wrap" }}><div style={{ minWidth: 0 }}><div style={{ fontWeight: 600, fontSize: "0.9375rem", marginBottom: 3 }}>{t.addToCalendar}</div><div style={{ fontSize: "0.8125rem", color: "var(--text-muted)" }}>{t.shareBeforeMeeting}</div></div><button onClick={() => downloadCalendar(session, t)} className="btn btn-secondary btn-small">{Icon.calendar} {t.addToCalendar}</button></div>
        </div>
      );
    };

    // =============================================
    // ROOM PHASE (with mini mode)
    // =============================================
    const RoomPhase = ({ session, update, goToReview, timerState, onTimerAction }) => {
      const { t } = useLang();
      const [showPause, setShowPause] = useState(false);
      const [skipPause, setSkipPause] = useState(loadSkipPause);
      const [activeLens, setActiveLens] = useState(null);
      const [adding, setAdding] = useState(false);
      const [draft, setDraft] = useState({ what: "", who: "", due: "" });
      const [showAob, setShowAob] = useState(false);
      const [aobDraft, setAobDraft] = useState("");
      const [showTip, setShowTip] = useState(false);
      const [showCommitmentTip, setShowCommitmentTip] = useState(false);
      const [pipWindow, setPipWindow] = useState(null);
      const notesRef = useRef();
      const miniModeRef = useRef();

      // Hex colors for PiP compatibility
      const lenses = {
        scope: { name: t.scope, color: "#007AFF", bg: "#E5F2FF", textColor: "#0055D4", question: t.scopeQuestion, description: t.scopeDesc, prompts: t.scopePrompts },
        voices: { name: t.voices, color: "#AF52DE", bg: "#F5E6FA", textColor: "#8944AB", question: t.voicesQuestion, description: t.voicesDesc, prompts: t.voicesPrompts },
        context: { name: t.context, color: "#FF9500", bg: "#FFF4E5", textColor: "#C45D00", question: t.contextQuestion, description: t.contextDesc, prompts: t.contextPrompts },
      };

      const topic = session.topics[session.currentTopicIndex];
      const isLast = session.currentTopicIndex === session.topics.length - 1;
      const totalCommitments = session.topics.reduce((s, x) => s + (x.commitments?.length || 0), 0);
      const progress = ((session.currentTopicIndex + 1) / session.topics.length) * 100;
      const totalDurationSecs = parseInt(session.duration) * 60;
      const elapsedSecs = timerState.elapsed;
      const remainingSecs = totalDurationSecs - elapsedSecs;
      const isOvertime = remainingSecs < 0;

      const updateTopic = (u) => { const topics = [...session.topics]; topics[session.currentTopicIndex] = { ...topic, ...u }; update({ ...session, topics }); };
      const addPrompt = (text) => { updateTopic({ notes: (topic.notes || "") + (topic.notes ? "\n\n" : "") + "→ " + text + "\n" }); setActiveLens(null); setTimeout(() => notesRef.current?.focus(), 50); };
      const saveCommitment = () => { if (!draft.what.trim()) return; updateTopic({ commitments: [...(topic.commitments || []), { id: Date.now(), what: draft.what.trim(), who: draft.who.trim() || t.theGroup, due: draft.due, done: false }] }); setDraft({ what: "", who: "", due: "" }); setAdding(false); };
      const toggleCommitment = (id) => { updateTopic({ commitments: topic.commitments.map(c => c.id === id ? { ...c, done: !c.done } : c) }); };
      const handleNext = () => { if (skipPause) { goNext(); } else { setShowPause(true); } };
      const goNext = () => { setShowPause(false); setActiveLens(null); if (isLast) goToReview(); else update({ ...session, currentTopicIndex: session.currentTopicIndex + 1 }); };
      const goPrev = () => { if (session.currentTopicIndex > 0) { setActiveLens(null); update({ ...session, currentTopicIndex: session.currentTopicIndex - 1 }); } };
      const addToAob = () => { if (!aobDraft.trim()) return; update({ ...session, aobTopics: [...(session.aobTopics || []), { id: Date.now(), title: aobDraft.trim() }] }); setAobDraft(""); };
      const removeFromAob = (id) => update({ ...session, aobTopics: session.aobTopics.filter(p => p.id !== id) });
      const restoreFromAob = (aob) => { update({ ...session, topics: [...session.topics, { id: Date.now(), title: aob.title, notes: "", commitments: [] }], aobTopics: session.aobTopics.filter(p => p.id !== aob.id) }); };

      // Mini mode (Picture-in-Picture)
      const openMiniMode = async () => {
        if (!("documentPictureInPicture" in window)) {
          alert(t.miniModeNotSupported);
          return;
        }
        try {
          const pip = await window.documentPictureInPicture.requestWindow({ width: 320, height: 480 });
          setPipWindow(pip);
          
          // Copy styles
          const style = pip.document.createElement("style");
          style.textContent = document.querySelector("style").textContent;
          pip.document.head.appendChild(style);
          
          // Add fonts
          const link = pip.document.createElement("link");
          link.href = "https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap";
          link.rel = "stylesheet";
          pip.document.head.appendChild(link);
          
          // Create container
          const container = pip.document.createElement("div");
          container.id = "pip-root";
          pip.document.body.appendChild(container);
          pip.document.body.style.margin = "0";
          pip.document.body.style.background = "#F5F5F7";
          
          pip.addEventListener("pagehide", () => setPipWindow(null));
        } catch (e) { console.error("PiP error:", e); }
      };

      // Render to PiP window
      useEffect(() => {
        if (!pipWindow) return;
        const container = pipWindow.document.getElementById("pip-root");
        if (!container) return;
        
        const root = ReactDOM.createRoot(container);
        root.render(
          <MiniModeContent 
            session={session} 
            timerState={timerState} 
            lenses={lenses} 
            activeLens={activeLens} 
            setActiveLens={setActiveLens}
            onPrev={goPrev}
            onNext={handleNext}
            t={t}
          />
        );
        return () => root.unmount();
      }, [pipWindow, session, timerState, activeLens, t]);

      const TimerDisplay = () => (
        <div className="card" style={{ padding: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>{Icon.clock} {isOvertime ? t.timeOver : t.timeRemaining}</div>
            {timerState.running && <span className="animate-pulse" style={{ width: 10, height: 10, borderRadius: "50%", background: isOvertime ? "var(--red)" : "var(--green)" }} />}
          </div>
          <div className={`timer-display ${isOvertime ? "timer-overtime" : ""}`} style={{ fontSize: "1.75rem", fontWeight: 500, marginBottom: 10 }}>{isOvertime && "+"}{formatTime(remainingSecs)}</div>
          <button onClick={() => onTimerAction(timerState.running ? "pause" : "start")} className="btn" style={{ width: "100%", padding: "12px", fontSize: "0.9375rem", background: timerState.running ? "var(--orange-soft)" : "var(--accent)", color: timerState.running ? "var(--orange-text)" : "white", fontWeight: 600, borderRadius: 8 }}>{timerState.running ? t.pauseTimer : t.startTimer}</button>
          {elapsedSecs > 0 && <div style={{ fontSize: "0.75rem", color: "var(--text-muted)", marginTop: 10, textAlign: "center" }}>{t.totalTime}: {formatTime(elapsedSecs)}</div>}
        </div>
      );

      return (
        <div className="room-layout" style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 20, minHeight: "calc(100vh - 140px)" }}>
          {showPause && <PauseModal onContinue={goNext} onBack={() => setShowPause(false)} isLast={isLast} onSkipChange={setSkipPause} />}
          <div className="mobile-only mobile-timer-section no-print"><TimerDisplay /></div>
          <aside className="no-print room-sidebar" style={{ display: "flex", flexDirection: "column", gap: 14 }}>
            <div className="desktop-only"><TimerDisplay /></div>
            <button onClick={openMiniMode} className="btn btn-secondary btn-small desktop-only" style={{ justifyContent: "center" }}>{Icon.float} {t.floatMode}</button>
            <div><div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 8, textTransform: "uppercase", padding: "0 4px" }}>{t.progress}</div><div className="progress-bar"><div className="progress-fill" style={{ width: progress + "%" }} /></div><div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 6, padding: "0 4px" }}>{session.currentTopicIndex + 1} {t.of} {session.topics.length}</div></div>
            <div style={{ flex: 1, overflow: "auto" }}>
              <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 10, textTransform: "uppercase", padding: "0 4px" }}>{t.agenda}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {session.topics.map((x, i) => (
                  <button key={x.id} onClick={() => { setActiveLens(null); update({ ...session, currentTopicIndex: i }); }} style={{ textAlign: "left", padding: 12, borderRadius: 10, border: i === session.currentTopicIndex ? "2px solid var(--accent)" : "1px solid transparent", background: i === session.currentTopicIndex ? "var(--bg-card)" : "transparent", cursor: "pointer", fontFamily: "inherit", minHeight: 48 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.6875rem", color: "var(--text-muted)", marginBottom: 4 }}><span>{String(i + 1).padStart(2, "0")}</span>{x.commitments?.length > 0 && <span style={{ color: "var(--green-text)", fontWeight: 600 }}>{x.commitments.length}✓</span>}</div>
                    <div className="sidebar-topic-text" style={{ fontWeight: i === session.currentTopicIndex ? 600 : 400, color: i === session.currentTopicIndex ? "var(--text)" : "var(--text-secondary)" }}>{x.title || t.untitledTopic}</div>
                  </button>
                ))}
              </div>
            </div>
            {totalCommitments > 0 && <button onClick={goToReview} className="btn btn-secondary btn-small" style={{ justifyContent: "center" }}><span style={{ width: 20, height: 20, borderRadius: "50%", background: "var(--green)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.6875rem", fontWeight: 700 }}>{totalCommitments}</span> {t.viewAll}</button>}
            <button onClick={() => setShowAob(!showAob)} className="btn btn-ghost btn-small" style={{ justifyContent: "center", fontSize: "0.8125rem" }}>{t.aob} {session.aobTopics?.length > 0 && `(${session.aobTopics.length})`}</button>
          </aside>
          <main className="card room-main" style={{ padding: 24, display: "flex", flexDirection: "column", overflow: "hidden" }}>
            {session.intention && <div className="intention-banner no-print" style={{ marginBottom: 16 }}><span style={{ color: "var(--blue-text)" }}>{Icon.target}</span><span style={{ fontSize: "1rem", color: "var(--text-secondary)" }}><strong>{t.goal}:</strong> {session.intention}</span></div>}
            {session.currentTopicIndex === 0 && <div className="no-print" style={{ marginBottom: 16 }}><TipBox text={t.tipRoomStart} show={showTip} onToggle={() => setShowTip(!showTip)} /></div>}
            <div className="animate-in" style={{ marginBottom: 16 }}>
              <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>{t.topic} {session.currentTopicIndex + 1} {t.of} {session.topics.length}</div>
              <h1 className="font-serif" style={{ fontSize: "clamp(1.625rem, 5vw, 2.25rem)", lineHeight: 1.2 }}>{topic.title || t.untitledTopic}</h1>
            </div>
            <div style={{ flex: 1, marginBottom: 16, minHeight: 100, background: "var(--bg-secondary)", borderRadius: "var(--radius)", padding: 4 }}><AutoTextarea ref={notesRef} value={topic.notes || ""} onChange={e => updateTopic({ notes: e.target.value })} placeholder={t.notesPlaceholder} style={{ fontSize: "1.0625rem", lineHeight: 1.6, minHeight: 100, padding: 16 }} /></div>
            {showAob && (
              <div className="aob-box animate-scale no-print" style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}><div><span style={{ fontWeight: 600, color: "var(--purple-text)", fontSize: "1rem" }}>{t.aob}</span><p style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 3 }}>{t.aobDesc}</p></div><button onClick={() => setShowAob(false)} className="btn btn-ghost btn-icon">{Icon.x}</button></div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}><input value={aobDraft} onChange={e => setAobDraft(e.target.value)} placeholder={t.aobPlaceholder} className="input input-small" style={{ flex: 1 }} onKeyDown={e => e.key === "Enter" && addToAob()} /><button onClick={addToAob} disabled={!aobDraft.trim()} className="btn btn-secondary btn-small">{Icon.plus}</button></div>
                {session.aobTopics?.length > 0 ? (<div style={{ display: "flex", flexDirection: "column", gap: 6 }}>{session.aobTopics.map(p => (<div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: "var(--bg-card)", borderRadius: 8, fontSize: "0.9375rem", gap: 10, minHeight: 48 }}><span style={{ flex: 1, minWidth: 0 }}>{p.title}</span><div style={{ display: "flex", gap: 6 }}><button onClick={() => restoreFromAob(p)} className="btn btn-ghost btn-small">{t.addToAgenda}</button><button onClick={() => removeFromAob(p.id)} className="btn btn-ghost btn-icon" style={{ opacity: 0.5 }}>{Icon.x}</button></div></div>))}</div>) : <p style={{ textAlign: "center", color: "var(--text-muted)", fontSize: "0.8125rem", padding: 10 }}>{t.noAob}</p>}
              </div>
            )}
            <div className="no-print" style={{ marginBottom: 16 }}>
              <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginBottom: 8 }}>{t.needToSurface}</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>{Object.entries(lenses).map(([k, v]) => <button key={k} onClick={() => setActiveLens(activeLens === k ? null : k)} className="btn btn-small" style={{ background: activeLens === k ? v.color : v.bg, color: activeLens === k ? "white" : v.textColor, fontWeight: 600 }}>{v.name}</button>)}</div>
              {activeLens && (
                <div className="animate-scale" style={{ marginTop: 12, padding: 14, background: lenses[activeLens].bg, borderRadius: "var(--radius)", borderLeft: "3px solid " + lenses[activeLens].color }}>
                  <div style={{ fontWeight: 600, marginBottom: 4, color: lenses[activeLens].textColor, fontSize: "1rem" }}>{lenses[activeLens].question}</div>
                  <div style={{ fontSize: "0.8125rem", color: "var(--text-secondary)", marginBottom: 10 }}>{lenses[activeLens].description}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{lenses[activeLens].prompts.map((p, i) => <button key={i} onClick={() => addPrompt(p)} className="btn btn-secondary btn-small" style={{ background: "var(--bg-card)", fontSize: "0.8125rem" }}>{p}</button>)}</div>
                </div>
              )}
            </div>
            <div style={{ borderTop: "1px solid var(--border-light)", paddingTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 10 }}><span style={{ fontWeight: 600, fontSize: "1rem" }}>{t.whatWeAgreed}</span><div style={{ display: "flex", gap: 8 }}>{!adding && <TipBox text={t.tipCommitment} show={false} onToggle={() => setShowCommitmentTip(!showCommitmentTip)} />}{!adding && <button onClick={() => setAdding(true)} className="btn btn-primary btn-small">{Icon.plus} {t.captureCommitment}</button>}</div></div>
              {showCommitmentTip && !adding && <div style={{ marginBottom: 12 }}><TipBox text={t.tipCommitment} show={true} onToggle={() => setShowCommitmentTip(false)} /></div>}
              {adding && (<div className="animate-scale" style={{ padding: 14, background: "var(--bg-secondary)", borderRadius: "var(--radius)", marginBottom: 12 }}><input value={draft.what} onChange={e => setDraft({ ...draft, what: e.target.value })} placeholder={t.commitmentWhatPlaceholder} className="input" style={{ marginBottom: 10 }} autoFocus onKeyDown={e => e.key === "Enter" && draft.what.trim() && saveCommitment()} /><div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }} className="mobile-grid-1"><input value={draft.who} onChange={e => setDraft({ ...draft, who: e.target.value })} placeholder={t.commitmentWhoPlaceholder} className="input input-small" /><input type="date" value={draft.due} onChange={e => setDraft({ ...draft, due: e.target.value })} className="input input-small" /></div><div style={{ display: "flex", gap: 8 }}><button onClick={saveCommitment} disabled={!draft.what.trim()} className="btn btn-primary btn-small">{Icon.check} {t.save}</button><button onClick={() => { setAdding(false); setDraft({ what: "", who: "", due: "" }); }} className="btn btn-ghost btn-small">{t.cancel}</button></div></div>)}
              {topic.commitments?.length > 0 ? (<div style={{ display: "flex", flexDirection: "column", gap: 8 }}>{topic.commitments.map(c => (<div key={c.id} style={{ padding: 14, background: c.done ? "var(--bg-secondary)" : "var(--green-soft)", borderRadius: 10, borderLeft: `3px solid ${c.done ? "var(--border)" : "var(--green)"}`, display: "flex", alignItems: "start", gap: 12, opacity: c.done ? 0.7 : 1 }}><Checkbox checked={c.done} onChange={() => toggleCommitment(c.id)} /><div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 500, textDecoration: c.done ? "line-through" : "none", fontSize: "1rem" }}>{c.what}</div><div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 4, display: "flex", flexWrap: "wrap", gap: 10 }}><span>{c.who}</span>{c.due && <span style={{ display: "flex", alignItems: "center", gap: 4 }}>{Icon.calendar} {c.due}</span>}</div></div><button onClick={() => updateTopic({ commitments: topic.commitments.filter(x => x.id !== c.id) })} className="btn btn-ghost btn-icon" style={{ opacity: 0.4 }}>{Icon.x}</button></div>))}</div>) : <p style={{ textAlign: "center", padding: 16, color: "var(--text-muted)", fontSize: "0.9375rem" }}>{t.noCommitmentsYet}</p>}
            </div>
            <div className="no-print" style={{ display: "flex", justifyContent: "space-between", marginTop: 16, paddingTop: 16, borderTop: "1px solid var(--border-light)", gap: 14 }}><button onClick={goPrev} disabled={session.currentTopicIndex === 0} className="btn btn-ghost">{Icon.back} {t.previous}</button><button onClick={handleNext} className="btn btn-primary">{isLast ? t.finish : t.nextTopic} {Icon.arrow}</button></div>
          </main>
        </div>
      );
    };

    // =============================================
    // REVIEW PHASE (with attendance)
    // =============================================
    const ReviewPhase = ({ session, update, onSave, timerState }) => {
      const { t } = useLang();
      const [copied, setCopied] = useState(false);
      const [filter, setFilter] = useState("all");
      const allCommitments = session.topics.flatMap(x => (x.commitments || []).map(c => ({ ...c, topic: x.title, topicId: x.id })));
      const filtered = filter === "all" ? allCommitments : filter === "done" ? allCommitments.filter(c => c.done) : allCommitments.filter(c => !c.done);
      const doneCount = allCommitments.filter(c => c.done).length;
      const presentCount = session.participants?.filter(p => p.present).length || 0;

      const toggleCommitment = (topicId, commitmentId) => {
        const topics = session.topics.map(topic => topic.id === topicId ? { ...topic, commitments: topic.commitments.map(c => c.id === commitmentId ? { ...c, done: !c.done } : c) } : topic);
        update({ ...session, topics });
      };

      const toggleParticipantPresence = (id) => {
        const participants = session.participants.map(p => p.id === id ? { ...p, present: !p.present } : p);
        update({ ...session, participants });
      };

      const copyText = async () => {
        let s = `${t.exportTitle.toUpperCase()}\n\n`;
        s += `${session.title}\n${session.date} | ${session.time} to ${calcEndTime(session.time, session.duration)}\n`;
        if (session.facilitator) s += `${t.facilitator}: ${session.facilitator}\n`;
        // Include attendance in export
        if (session.participants?.length > 0) {
          const present = session.participants.filter(p => p.present).map(p => p.name);
          const absent = session.participants.filter(p => !p.present).map(p => p.name);
          if (present.length > 0) s += `${t.present}: ${present.join(", ")}\n`;
          if (absent.length > 0) s += `${t.absent}: ${absent.join(", ")}\n`;
        }
        if (session.intention) s += `\n${t.goal}: ${session.intention}\n`;
        s += `\n${t.totalTime}: ${formatTime(timerState.elapsed)}\n`;
        s += `\n${t.commitments.toUpperCase()}\n\n`;
        if (!allCommitments.length) s += `${t.noCommitmentsCaptured}\n`;
        else allCommitments.forEach(c => { s += `${c.done ? "☑" : "☐"} ${c.what}\n   ${c.who}${c.due ? ` | ${t.dueDate}: ${c.due}` : ""}\n   (${c.topic})\n\n`; });
        if (session.aobTopics?.length > 0) { s += `\n${t.aob.toUpperCase()}\n\n`; session.aobTopics.forEach(p => { s += `• ${p.title}\n`; }); }
        s += `\n\n${t.exportFacilitatedWith}`;
        try { await navigator.clipboard.writeText(s); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
      };

      return (
        <div className="animate-in" style={{ maxWidth: 600, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px", fontSize: "1.125rem" }}>◐</div>
            <h1 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 6 }}>{session.title}</h1>
            <p style={{ color: "var(--text-muted)", fontSize: "0.9375rem" }}>{session.date} · {session.time} to {calcEndTime(session.time, session.duration)}</p>
            {session.participants?.length > 0 && <p style={{ marginTop: 8, color: "var(--text-secondary)", fontSize: "0.875rem" }}>{Icon.users} {presentCount}/{session.participants.length} {t.participantsPresent}</p>}
            {session.intention && <p style={{ marginTop: 10, color: "var(--text-secondary)", fontSize: "1rem", maxWidth: 440, margin: "10px auto 0" }}>{session.intention}</p>}
            <p style={{ marginTop: 12, fontSize: "0.9375rem", color: "var(--text-muted)" }}>{t.totalTime}: <strong>{formatTime(timerState.elapsed)}</strong></p>
          </div>

          {/* Attendance section */}
          {session.participants?.length > 0 && (
            <div className="card" style={{ padding: 20, marginBottom: 20 }}>
              <h2 style={{ fontWeight: 600, fontSize: "1rem", marginBottom: 14 }}>{t.attendance}</h2>
              <p style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginBottom: 14 }}>{t.markAttendance}</p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 10 }}>
                {session.participants.map(p => (
                  <div key={p.id} className={`participant-chip ${p.present ? "present" : "absent"}`} onClick={() => toggleParticipantPresence(p.id)} style={{ cursor: "pointer" }}>
                    {p.present ? Icon.check : Icon.x}
                    <span>{p.name}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="no-print" style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            <button onClick={copyText} className="btn btn-secondary btn-small">{copied ? Icon.check : Icon.copy} {copied ? t.copied : t.copy}</button>
            <button onClick={() => window.print()} className="btn btn-secondary btn-small">{Icon.print} {t.print}</button>
            <button onClick={() => exportSession(session, t)} className="btn btn-secondary btn-small">{Icon.download} {t.exportSession}</button>
            <button onClick={onSave} className="btn btn-secondary btn-small">{Icon.check} {t.save}</button>
          </div>
          <div style={{ marginBottom: 28 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}><h2 style={{ fontWeight: 600, fontSize: "1.0625rem" }}>{t.ourCommitments} <span style={{ color: "var(--text-muted)", fontWeight: 400 }}>({doneCount}/{allCommitments.length})</span></h2><div className="no-print" style={{ display: "flex", gap: 6 }}>{[["all", t.allCommitments], ["pending", t.pending], ["done", t.completed]].map(([val, label]) => (<button key={val} onClick={() => setFilter(val)} className="btn btn-small" style={{ background: filter === val ? "var(--accent)" : "var(--bg-secondary)", color: filter === val ? "white" : "var(--text-muted)" }}>{label}</button>))}</div></div>
            {!filtered.length ? (<div className="card" style={{ padding: 24, textAlign: "center" }}><p style={{ color: "var(--text-muted)", fontSize: "1rem" }}>{filter === "all" ? t.noCommitmentsCaptured : `No ${filter} commitments`}</p>{filter === "all" && <button onClick={() => update({ ...session, phase: "room" })} className="btn btn-secondary" style={{ marginTop: 14 }}>{t.goBackAndAdd}</button>}</div>) : (<div style={{ display: "flex", flexDirection: "column", gap: 10 }}>{filtered.map(c => (<div key={c.id} className="card" style={{ padding: 16, display: "flex", alignItems: "start", gap: 14, opacity: c.done ? 0.7 : 1 }}><Checkbox checked={c.done} onChange={() => toggleCommitment(c.topicId, c.id)} /><div style={{ flex: 1, minWidth: 0 }}><div style={{ fontWeight: 500, marginBottom: 6, textDecoration: c.done ? "line-through" : "none", fontSize: "1.0625rem" }}>{c.what}</div><div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", display: "flex", flexWrap: "wrap", gap: 10 }}><span>{c.who}</span>{c.due && <span style={{ display: "flex", alignItems: "center", gap: 5 }}>{Icon.calendar} {c.due}</span>}<span>({c.topic})</span></div></div></div>))}</div>)}
          </div>
          {session.aobTopics?.length > 0 && (<div style={{ marginBottom: 28 }}><h3 style={{ fontWeight: 600, marginBottom: 12, fontSize: "1rem" }}>{t.aob}</h3><div className="aob-box">{session.aobTopics.map(p => (<div key={p.id} style={{ padding: "10px 0", borderBottom: "1px solid var(--purple)", fontSize: "1rem" }}>{p.title}</div>))}</div></div>)}
          {session.topics.some(x => x.notes?.trim()) && (<div className="print-break" style={{ borderTop: "1px solid var(--border-light)", paddingTop: 20 }}><h3 style={{ fontWeight: 600, marginBottom: 14, fontSize: "1rem" }}>{t.discussionNotes}</h3><div style={{ display: "flex", flexDirection: "column", gap: 16 }}>{session.topics.filter(x => x.notes?.trim()).map(x => (<div key={x.id}><div style={{ fontWeight: 600, marginBottom: 6, fontSize: "1rem" }}>{x.title}</div><div style={{ color: "var(--text-secondary)", whiteSpace: "pre-wrap", lineHeight: 1.6, fontSize: "0.9375rem" }}>{x.notes}</div></div>))}</div></div>)}
          <div style={{ marginTop: 28, paddingTop: 14, borderTop: "1px solid var(--border-light)", textAlign: "center", color: "var(--text-muted)", fontSize: "0.8125rem" }}>{t.agreedInTheRoom}</div>
          <div className="no-print" style={{ textAlign: "center", marginTop: 20 }}><button onClick={() => update({ ...session, phase: "home" })} className="btn btn-ghost">{Icon.back} {t.backToHome}</button><span style={{ margin: "0 10px", color: "var(--text-muted)" }}>·</span><button onClick={() => { if (confirm(t.confirmStartOver)) { save(null); update(null); } }} className="btn btn-ghost">{Icon.refresh} {t.newSession}</button></div>
        </div>
      );
    };

    // =============================================
    // MAIN APP
    // =============================================
    const App = () => {
      const [session, setSession] = useState(() => load() || null);
      const [showHelp, setShowHelp] = useState(false);
      const [showSaved, setShowSaved] = useState(false);
      const [showAutoSaved, setShowAutoSaved] = useState(false);
      const [lang, setLangState] = useState(loadLang);
      
      // Timer persistence: load saved timer or start fresh
      const [timerState, setTimerState] = useState(() => {
        const saved = loadTimer();
        if (saved && saved.sessionId === load()?.id) {
          // Resume timer if it was running
          if (saved.running && saved.pausedAt) {
            return { running: false, elapsed: saved.elapsed, startedAt: null };
          }
          return { running: false, elapsed: saved.elapsed || 0, startedAt: null };
        }
        return { running: false, elapsed: 0, startedAt: null };
      });
      
      // Undo state
      const [undoState, setUndoState] = useState({ show: false, type: null, data: null, message: "" });

      const setLang = (l) => { setLangState(l); saveLang(l); };
      const t = translations[lang];
      const update = useCallback((s) => { setSession(s); if (s) save(s); }, []);
      const setPhase = (p) => update({ ...session, phase: p });
      const canEnterRoom = session?.title?.trim() && session?.topics?.some(x => x.title?.trim());

      // Timer tick
      useEffect(() => { 
        if (!timerState.running) return; 
        const i = setInterval(() => { 
          setTimerState(prev => ({ ...prev, elapsed: prev.elapsed + 1 })); 
        }, 1000); 
        return () => clearInterval(i); 
      }, [timerState.running]);
      
      // Save timer state when it changes
      useEffect(() => {
        if (session?.id) {
          saveTimer({ sessionId: session.id, elapsed: timerState.elapsed, running: timerState.running, pausedAt: timerState.running ? null : Date.now() });
        }
      }, [timerState.elapsed, timerState.running, session?.id]);
      
      // Auto-save indicator every 30 seconds during active session
      useEffect(() => {
        if (!session || session.phase === "home") return;
        const i = setInterval(() => {
          setShowAutoSaved(true);
          setTimeout(() => setShowAutoSaved(false), 1500);
        }, 30000);
        return () => clearInterval(i);
      }, [session?.phase]);

      const handleTimerAction = (action) => { 
        if (action === "start") setTimerState(prev => ({ ...prev, running: true, startedAt: Date.now() })); 
        else if (action === "pause") setTimerState(prev => ({ ...prev, running: false })); 
      };

      // Undo handlers
      const handleUndo = () => {
        if (!undoState.data) return;
        if (undoState.type === "topic") {
          const { topic, index } = undoState.data;
          const topics = [...session.topics];
          topics.splice(index, 0, topic);
          update({ ...session, topics });
        } else if (undoState.type === "participant") {
          const { participant } = undoState.data;
          update({ ...session, participants: [...session.participants, participant] });
        }
        setUndoState({ show: false, type: null, data: null, message: "" });
      };
      
      const deleteTopic = (index) => {
        if (session.topics.length <= 1) return;
        const topic = session.topics[index];
        const newTopics = session.topics.filter((_, i) => i !== index);
        update({ ...session, topics: newTopics, currentTopicIndex: Math.min(session.currentTopicIndex, newTopics.length - 1) });
        setUndoState({ show: true, type: "topic", data: { topic, index }, message: t.topicDeleted });
      };
      
      const deleteParticipant = (id) => {
        const participant = session.participants.find(p => p.id === id);
        update({ ...session, participants: session.participants.filter(p => p.id !== id) });
        setUndoState({ show: true, type: "participant", data: { participant }, message: t.participantDeleted });
      };

      useEffect(() => {
        const handleKey = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if (session?.phase === "room") {
            if (e.key === "ArrowRight" || e.key === "n") { if (session.currentTopicIndex < session.topics.length - 1) update({ ...session, currentTopicIndex: session.currentTopicIndex + 1 }); }
            if (e.key === "ArrowLeft" || e.key === "p") { if (session.currentTopicIndex > 0) update({ ...session, currentTopicIndex: session.currentTopicIndex - 1 }); }
            if (e.key === "t") handleTimerAction(timerState.running ? "pause" : "start");
          }
          if ((e.metaKey || e.ctrlKey) && e.key === "s") { e.preventDefault(); if (session) { addToHistory(session); setShowSaved(true); setTimeout(() => setShowSaved(false), 1500); } }
          if ((e.metaKey || e.ctrlKey) && e.key === "z" && undoState.show) { e.preventDefault(); handleUndo(); }
        };
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [session, update, timerState.running, undoState]);

      const handleSave = () => { if (session) { addToHistory(session); setShowSaved(true); setTimeout(() => setShowSaved(false), 1500); } };
      const startFromTemplate = (template) => { 
        const newSession = createSession(template, lang);
        update(newSession); 
        setTimerState({ running: false, elapsed: 0, startedAt: null }); 
        saveTimer({ sessionId: newSession.id, elapsed: 0, running: false });
      };
      const openSession = (s) => {
        update({ ...s, phase: s.phase === "home" ? "review" : s.phase });
        // Load timer for this session
        const saved = loadTimer();
        if (saved && saved.sessionId === s.id) {
          setTimerState({ running: false, elapsed: saved.elapsed || 0, startedAt: null });
        } else {
          setTimerState({ running: false, elapsed: 0, startedAt: null });
        }
      };
      const importSession = (s) => update({ ...s, phase: "review", id: Date.now().toString(36) });
      const continueSession = () => { if (session && session.phase !== "home") setPhase(session.phase); else setPhase("setup"); };

      if (!session || session.phase === "home") { return (<LangContext.Provider value={{ t, lang, setLang }}><LandingPage currentSession={session} onStart={startFromTemplate} onContinue={continueSession} onOpenSession={openSession} onImport={importSession} /></LangContext.Provider>); }

      return (
        <LangContext.Provider value={{ t, lang, setLang }}>
          <SaveIndicator show={showSaved} text={t.saved} />
          <SaveIndicator show={showAutoSaved && !showSaved} text={t.autoSaved} />
          <UndoToast show={undoState.show} message={undoState.message} onUndo={handleUndo} onDismiss={() => setUndoState({ show: false, type: null, data: null, message: "" })} />
          {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column" }}>
            <header className="no-print" style={{ padding: "12px 18px", borderBottom: "1px solid var(--border-light)", background: "var(--bg-card)" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10 }}><button onClick={() => setPhase("home")} style={{ width: 36, height: 36, borderRadius: 9, background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1rem", border: "none", cursor: "pointer" }}>◐</button><span className="desktop-only" style={{ fontWeight: 600, fontSize: "1rem" }}>{t.appName}</span></div>
                <PhaseNav phase={session.phase} setPhase={setPhase} canEnterRoom={canEnterRoom} />
                <MobileNav phase={session.phase} setPhase={setPhase} canEnterRoom={canEnterRoom} />
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}><LangToggle lang={lang} setLang={setLang} /><button onClick={() => setShowHelp(true)} className="btn btn-ghost btn-icon" title={t.howThisWorks}>{Icon.help}</button><button onClick={() => { if (confirm(t.startOver)) { save(null); update(null); } }} className="btn btn-ghost btn-icon" title={t.newSession}>{Icon.refresh}</button></div>
              </div>
            </header>
            <main style={{ flex: 1, padding: "20px 18px" }} className="mobile-p-sm">
              <div style={{ maxWidth: 1100, margin: "0 auto" }}>
                {session.phase === "setup" && <SetupPhase session={session} update={update} onDeleteParticipant={deleteParticipant} />}
                {session.phase === "agenda" && <AgendaPhase session={session} update={update} onDeleteTopic={deleteTopic} />}
                {session.phase === "room" && <RoomPhase session={session} update={update} goToReview={() => setPhase("review")} timerState={timerState} onTimerAction={handleTimerAction} />}
                {session.phase === "review" && <ReviewPhase session={session} update={update} onSave={handleSave} timerState={timerState} />}
              </div>
            </main>
            {(session.phase === "setup" || session.phase === "agenda") && (<footer className="no-print" style={{ padding: "14px 18px", borderTop: "1px solid var(--border-light)", background: "var(--bg-card)" }}><div style={{ maxWidth: 560, margin: "0 auto", display: "flex", justifyContent: "space-between" }}>{session.phase === "agenda" ? (<><button onClick={() => setPhase("setup")} className="btn btn-ghost">{Icon.back}</button><button onClick={() => setPhase("room")} disabled={!canEnterRoom} className="btn btn-primary">{t.enterTheRoom} {Icon.arrow}</button></>) : (<><div /><button onClick={() => setPhase("agenda")} className="btn btn-primary">{t.buildAgenda} {Icon.arrow}</button></>)}</div></footer>)}
          </div>
        </LangContext.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
