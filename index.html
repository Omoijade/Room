<html lang="en">
<head>

  <title>The Room</title>
  <meta name="description" content="A facilitation surface for decisions that stick." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◐</text></svg>" />

  <style>
    :root {
      --bg: #F5F5F7; --bg-card: #FFFFFF; --bg-secondary: #FAFAFA; --bg-dark: #1D1D1F;
      --accent: #1D1D1F; --accent-soft: #E8E8ED;
      --text: #1D1D1F; --text-secondary: #6E6E73; --text-muted: #AEAEB2; --text-on-dark: #F5F5F7;
      --border: #D2D2D7; --border-light: #E8E8ED;
      --green: #34C759; --green-soft: #E8FAE8; --green-text: #248A3D;
      --blue: #007AFF; --blue-soft: #E5F2FF; --blue-text: #0055D4;
      --purple: #AF52DE; --purple-soft: #F5E6FA; --purple-text: #8944AB;
      --orange: #FF9500; --orange-soft: #FFF4E5; --orange-text: #C45D00;
      --yellow: #FFCC00; --yellow-soft: #FFF9E5; --yellow-text: #996600;
      --red: #FF3B30; --red-soft: #FFE5E5; --red-text: #D70015;
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --touch-target: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; overflow-x: hidden; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; line-height: 1.5; letter-spacing: -0.022em;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      position: relative;
      width: 100%;
    }
    .font-serif { font-family: "DM Serif Display", "New York", Georgia, serif; letter-spacing: -0.01em; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes saveFlash { 0% { opacity: 0; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.5s ease, slideUp 0.5s ease; animation-fill-mode: both; }
    .animate-fade { animation: fadeIn 0.25s ease; }
    .animate-scale { animation: scaleIn 0.2s ease; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pulse { animation: pulse 1.5s ease infinite; }
    .animate-save { animation: saveFlash 1.5s ease; }
    .animate-dropdown { animation: slideDown 0.2s ease; }
    .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; }
    *:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media print {
      .no-print { display: none !important; }
      body { background: white; font-size: 12pt; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
      .print-break { page-break-before: always; }
    }

    @media (max-width: 768px) {
      html { font-size: 16px; }
      body { overflow-x: hidden; }
      .desktop-only { display: none !important; }
      .mobile-stack { flex-direction: column !important; }
      .mobile-full { width: 100% !important; min-width: 0 !important; }
      .mobile-grid-1 { grid-template-columns: 1fr !important; }
      .mobile-grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
      .room-layout { display: flex !important; flex-direction: column !important; }
      .room-sidebar { width: 100% !important; margin-top: 16px; }
      .room-main { order: 2; }
      .mobile-timer-section { order: 1; margin-bottom: 16px; }
      .mobile-show { display: flex !important; }
      .mobile-p-sm { padding: 16px !important; }
      .topic-row { padding: 14px 16px; }
      .sidebar-topic-text { font-size: 0.9375rem; }
      .card { max-width: 100%; overflow: hidden; }
      main { max-width: 100%; overflow-x: hidden; }
    }
    @media (min-width: 769px) {
      .mobile-only { display: none !important; }
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit; font-weight: 600; border-radius: var(--radius); cursor: pointer;
      border: none; transition: all 0.2s ease; letter-spacing: -0.01em;
      min-height: var(--touch-target);
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn-primary { background: var(--accent); color: white; padding: 14px 28px; font-size: 1rem; }
    .btn-primary:hover:enabled { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; font-size: 1rem; }
    .btn-secondary:hover:enabled { background: var(--bg-secondary); border-color: var(--text-muted); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 10px 16px; font-size: 0.9375rem; }
    .btn-ghost:hover { background: var(--accent-soft); color: var(--text); }
    .btn-small { padding: 10px 16px; font-size: 0.875rem; border-radius: 8px; min-height: 40px; }
    .btn-icon { padding: 10px; border-radius: 8px; min-width: var(--touch-target); }
    .btn-large { padding: 18px 36px; font-size: 1.0625rem; border-radius: var(--radius-lg); }

    .input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; background: var(--bg-card); color: var(--text); transition: all 0.15s;
      min-height: var(--touch-target);
    }
    .input::placeholder { color: var(--text-muted); }
    .input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px var(--blue-soft); }
    .input-small { padding: 12px 14px; font-size: 0.9375rem; }

    .textarea-auto {
      width: 100%; min-height: 60px; padding: 16px; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: inherit; line-height: 1.5; background: transparent;
      color: var(--text); resize: none; overflow: hidden;
    }
    .textarea-auto:focus { outline: none; }
    .textarea-auto::placeholder { color: var(--text-muted); }

    .card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
    .progress-bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s ease; }

    .intention-banner {
      background: linear-gradient(135deg, var(--blue-soft) 0%, var(--purple-soft) 100%);
      border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    }

    .lang-toggle { display: flex; align-items: center; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: 8px; font-size: 0.875rem; }
    .lang-toggle button { padding: 8px 12px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; font-family: inherit; min-height: 36px; }
    .lang-toggle button.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow-sm); }

    .topic-row { 
      display: flex; 
      align-items: flex-start; 
      gap: 12px; 
      padding: 16px; 
      background: var(--bg-secondary); 
      border-radius: 10px; 
      transition: all 0.15s; 
      min-height: var(--touch-target);
      width: 100%;
      overflow: hidden;
    }
    .topic-row:hover { background: var(--accent-soft); }
    .topic-row .reorder-btns { opacity: 0; transition: opacity 0.15s; margin-top: 2px; flex-shrink: 0; }
    .topic-row:hover .reorder-btns { opacity: 1; }
    .topic-row textarea { 
      color: var(--text);
    }
    .topic-row textarea::placeholder { color: var(--text-muted); }

    .aob-box { background: var(--purple-soft); border: 1px solid var(--purple); border-radius: var(--radius); padding: 18px; }

    .checkbox { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .checkbox.checked { background: var(--green); border-color: var(--green); color: white; }
    .checkbox:hover { border-color: var(--green); }

    .session-card { padding: 18px; border: 1px solid var(--border-light); border-radius: var(--radius); transition: all 0.2s; cursor: pointer; background: var(--bg-card); min-height: var(--touch-target); }
    .session-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }

    .template-card { padding: 16px; border: 2px solid var(--border-light); border-radius: var(--radius-lg); transition: all 0.2s; cursor: pointer; text-align: left; background: var(--bg-card); }
    .template-card:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .template-card.selected { border-color: var(--accent); background: var(--accent-soft); }

    .tip-box { padding: 16px 18px; background: var(--blue-soft); border-radius: var(--radius); font-size: 0.9375rem; color: var(--blue-text); line-height: 1.5; }

    .save-indicator { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; background: var(--green); color: white; border-radius: var(--radius); font-size: 0.9375rem; font-weight: 500; display: flex; align-items: center; gap: 8px; z-index: 100; }

    .mobile-nav { position: relative; }
    .mobile-nav-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 50; margin-top: 4px; overflow: hidden; min-width: 200px; }
    .mobile-nav-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border-light); cursor: pointer; font-weight: 500; min-height: var(--touch-target); font-size: 1rem; }
    .mobile-nav-item:last-child { border-bottom: none; }
    .mobile-nav-item:hover { background: var(--bg-secondary); }
    .mobile-nav-item.active { background: var(--accent-soft); color: var(--accent); }
    .mobile-nav-item.disabled { opacity: 0.4; cursor: default; }

    .timer-display { font-family: ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .timer-overtime { color: var(--red-text); }

    .template-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
    .template-topic { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 0.9375rem; color: var(--text-secondary); }
    .template-topic-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; font-weight: 600; flex-shrink: 0; }
    
    /* Sidebar topic items - ensure text wraps */
    .sidebar-topic-text { 
      font-size: 0.875rem; 
      line-height: 1.5;
      word-break: break-word;
      overflow-wrap: break-word;
      hyphens: auto;
      white-space: normal;
      display: block;
    }
  </style>
</head>

    const formatTime = (secs) => {
      const absSecs = Math.abs(secs);
      const mins = Math.floor(absSecs / 60);
      const s = absSecs % 60;
      return `${mins}:${s.toString().padStart(2, "0")}`;
    };
    const calcEndTime = (start, mins) => { if (!start) return ""; const [h, m] = start.split(":").map(Number); const d = new Date(); d.setHours(h, m + parseInt(mins || 0)); return d.toTimeString().slice(0, 5); };
    const formatDate = (d) => { try { return new Date(d).toLocaleDateString(undefined, { month: "short", day: "numeric" }); } catch { return d; } };

      const ref = useRef(null);
      useLayoutEffect(() => { if (ref.current) { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; } }, [value]);
      return <textarea ref={ref} value={value} onChange={onChange} placeholder={placeholder} className={"textarea-auto " + className} style={style} rows={1} {...props} />;
    };

    // Topic input that expands for long text
    const TopicInput = ({ value, onChange, placeholder }) => {
      const ref = useRef(null);
      
      const adjustHeight = () => {
        if (ref.current) {
          ref.current.style.height = "auto";
          ref.current.style.height = Math.max(24, ref.current.scrollHeight) + "px";
        }
      };
      
      useLayoutEffect(() => {
        adjustHeight();
      }, [value]);
      
      // Also adjust on window resize for responsive behavior
      useEffect(() => {
        window.addEventListener("resize", adjustHeight);
        return () => window.removeEventListener("resize", adjustHeight);
      }, []);
      
      return (
        <textarea
          ref={ref}
          value={value}
          onChange={onChange}

    const PauseModal = ({ onContinue, onBack, isLast, onSkipChange }) => {
      const { t } = useLang();
      const [skipChecked, setSkipChecked] = useState(false);

        if (skipChecked) {
          saveSkipPause(true);
          onSkipChange(true);
        }
        onContinue();
      };
      
      return (
        <div className="animate-fade no-print" style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", backdropFilter: "blur(8px)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
          <div className="card animate-scale" style={{ maxWidth: 380, width: "100%", padding: 24, textAlign: "center" }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: "var(--accent-soft)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", fontSize: "1.125rem" }}>◐</div>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              <button onClick={handleContinue} className="btn btn-primary" style={{ width: "100%" }}>{isLast ? t.yesSeeCommitments : t.yesNextTopic}</button>
              <button onClick={onBack} className="btn btn-secondary" style={{ width: "100%" }}>{t.keepDiscussing}</button>

            <label style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 10, marginTop: 18, cursor: "pointer", fontSize: "0.875rem", color: "var(--text-muted)", minHeight: "var(--touch-target)" }}>

              {t.skipNextTime}
            </label>
          </div>
        </div>
      );

    const PhaseNav = ({ phase, setPhase, canEnterRoom }) => {
      const { t } = useLang();
      const phases = [{ id: "setup", label: t.setup }, { id: "agenda", label: t.agenda }, { id: "room", label: t.session }, { id: "review", label: t.commitments }];
      const currentIndex = phases.findIndex(p => p.id === phase);
      return (
        <div className="desktop-only" style={{ display: "flex", alignItems: "center", gap: 4, background: "var(--bg-secondary)", padding: 4, borderRadius: "var(--radius)" }}>
          {phases.map((p, i) => {
            const isActive = p.id === phase, isPast = i < currentIndex, isDisabled = p.id === "room" && !canEnterRoom;
            return <button key={p.id} onClick={() => !isDisabled && setPhase(p.id)} disabled={isDisabled} className="btn" style={{ padding: "12px 18px", fontSize: "0.9375rem", fontWeight: isActive ? 600 : 500, borderRadius: 8, background: isActive ? "var(--bg-card)" : "transparent", color: isActive ? "var(--text)" : isPast ? "var(--text-secondary)" : "var(--text-muted)", boxShadow: isActive ? "var(--shadow-sm)" : "none", minHeight: 44 }}>{p.label}</button>;
          })}
        </div>
      );
    };

    const SetupPhase = ({ session, update }) => {
      const { t } = useLang();
      const [showTip, setShowTip] = useState(false);
      return (
        <div className="animate-in" style={{ maxWidth: 560, margin: "0 auto", width: "100%" }}>
          <div className="card" style={{ padding: 24, marginBottom: 14 }}>
            <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 10, textTransform: "uppercase" }}>{t.meetingTitle}</label>
            <AutoTextarea value={session.title} onChange={e => update({ ...session, title: e.target.value })} placeholder={t.meetingTitlePlaceholder} className="font-serif" style={{ fontSize: "1.5rem", padding: 0, lineHeight: 1.3 }} autoFocus />
          </div>
          <div className="card" style={{ padding: 24, marginBottom: 14 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 10 }}>
              <label style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", textTransform: "uppercase" }}>{t.whatToLeaveWith}</label>
              <TipBox text={t.tipSetup} show={showTip} onToggle={() => setShowTip(!showTip)} />
            </div>
            <AutoTextarea value={session.intention} onChange={e => update({ ...session, intention: e.target.value })} placeholder={t.intentionPlaceholder} style={{ fontSize: "1.125rem", padding: 0 }} />
            <p style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 10 }}>{t.intentionHelp}</p>
          </div>
          <div className="card" style={{ padding: 24 }}>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }} className="mobile-grid-1">
              <div>
                <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.meetingDate}</label>
                <input type="date" value={session.date} onChange={e => update({ ...session, date: e.target.value })} className="input" />
              </div>
              <div>
                <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.time}</label>
                <input type="time" value={session.time} onChange={e => update({ ...session, time: e.target.value })} className="input" />
              </div>
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.duration}</label>
              <select value={session.duration} onChange={e => update({ ...session, duration: e.target.value })} className="input" style={{ width: "100%" }}>
                <option value="15">15 minutes</option>
                <option value="30">30 minutes</option>
                <option value="45">45 minutes</option>
                <option value="60">1 hour</option>
                <option value="90">1.5 hours</option>
                <option value="120">2 hours</option>
              </select>
            </div>
            <div style={{ marginBottom: 14 }}>
              <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.facilitator}</label>
              <input value={session.facilitator} onChange={e => update({ ...session, facilitator: e.target.value })} placeholder={t.facilitatorPlaceholder} className="input" />
            </div>
            <div>
              <label style={{ display: "block", fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", marginBottom: 8, textTransform: "uppercase" }}>{t.attendees}</label>
              <input value={session.attendees || ""} onChange={e => update({ ...session, attendees: e.target.value })} placeholder={t.attendeesPlaceholder} className="input" />
            </div>
          </div>
        </div>
      );
    };

    const AgendaPhase = ({ session, update }) => {
      const { t } = useLang();
      const [copied, setCopied] = useState(false);
      const [showTip, setShowTip] = useState(false);
      const updateTopic = (i, changes) => { const topics = [...session.topics]; topics[i] = { ...topics[i], ...changes }; update({ ...session, topics }); };
      const addTopic = () => update({ ...session, topics: [...session.topics, { id: Date.now(), title: "", notes: "", commitments: [], timeEstimate: "" }] });
      const removeTopic = (i) => { if (session.topics.length <= 1) return; update({ ...session, topics: session.topics.filter((_, j) => j !== i) }); };
      const moveTopic = (i, dir) => { const j = i + dir; if (j < 0 || j >= session.topics.length) return; const topics = [...session.topics]; [topics[i], topics[j]] = [topics[j], topics[i]]; update({ ...session, topics }); };
      const copyAgenda = async () => {
        let s = `${session.title}\n${session.date} | ${session.time} to ${calcEndTime(session.time, session.duration)}\n`;
        if (session.facilitator) s += `${t.facilitator}: ${session.facilitator}\n`;
        if (session.attendees) s += `${t.attendees}: ${session.attendees}\n`;
        if (session.intention) s += `\n${t.goal}: ${session.intention}\n`;
        s += `\n${t.agenda.toUpperCase()}\n`;
        session.topics.forEach((x, i) => { if (x.title.trim()) s += `${i + 1}. ${x.title}\n`; });
        try { await navigator.clipboard.writeText(s); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
      };

      return (
        <div className="animate-in" style={{ maxWidth: 560, margin: "0 auto", width: "100%" }}>
          <div style={{ marginBottom: 18 }}>
            <h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 6 }}>{session.title || t.untitledSession}</h2>
            <p style={{ color: "var(--text-muted)", fontSize: "0.9375rem" }}>{session.date} · {session.time} to {calcEndTime(session.time, session.duration)}</p>
          </div>
          {session.intention && <div className="intention-banner" style={{ marginBottom: 18 }}><span style={{ color: "var(--blue-text)" }}>{Icon.target}</span><span style={{ fontSize: "0.9375rem", color: "var(--text-secondary)" }}><strong>{t.goal}:</strong> {session.intention}</span></div>}
          
          {showTip && <div style={{ marginBottom: 14 }}><TipBox text={t.tipAgenda} show={showTip} onToggle={() => setShowTip(false)} /></div>}
          
          <div className="card" style={{ padding: 20, marginBottom: 14, overflow: "hidden" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, gap: 10, flexWrap: "wrap" }}>
              <label style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-secondary)", textTransform: "uppercase" }}>{t.agenda}</label>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <TipBox text={t.tipAgenda} show={false} onToggle={() => setShowTip(!showTip)} />
                <button onClick={copyAgenda} className="btn btn-ghost btn-small">{copied ? Icon.check : Icon.copy} {copied ? t.agendaCopied : t.copyAgenda}</button>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 14 }}>
              {session.topics.map((topic, i) => (
                <div key={topic.id} className="topic-row">
                  <div style={{ width: 26, height: 26, borderRadius: "50%", background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.75rem", fontWeight: 600, flexShrink: 0, marginTop: 2 }}>{i + 1}</div>
                  <TopicInput value={topic.title} onChange={e => updateTopic(i, { title: e.target.value })} placeholder={t.topicPlaceholder} />
                  <div className="reorder-btns desktop-only" style={{ display: "flex", gap: 2 }}>
                    <button onClick={() => moveTopic(i, -1)} disabled={i === 0} className="btn btn-ghost btn-icon">{Icon.up}</button>
                    <button onClick={() => moveTopic(i, 1)} disabled={i === session.topics.length - 1} className="btn btn-ghost btn-icon">{Icon.down}</button>
                  </div>
                  {session.topics.length > 1 && <button onClick={() => removeTopic(i)} className="btn btn-ghost btn-icon" style={{ opacity: 0.4, marginTop: 2 }}>{Icon.x}</button>}
                </div>
              ))}
            </div>
            <button onClick={addTopic} className="btn btn-ghost" style={{ width: "100%", justifyContent: "center" }}>{Icon.plus} {t.addTopic}</button>
          </div>
          
          {/* Calendar button */}
          <div className="card" style={{ padding: 18, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14, flexWrap: "wrap" }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ fontWeight: 600, fontSize: "0.9375rem", marginBottom: 3 }}>{t.addToCalendar}</div>
              <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)" }}>{t.shareBeforeMeeting}</div>
            </div>
            <button onClick={() => downloadCalendar(session, t)} className="btn btn-secondary btn-small">{Icon.calendar} {t.addToCalendar}</button>
          </div>
        </div>
      );

    const RoomPhase = ({ session, update, goToReview, timerState, onTimerAction }) => {
      const { t } = useLang();
      const [showPause, setShowPause] = useState(false);
      const [skipPause, setSkipPause] = useState(loadSkipPause);
      const [activeLens, setActiveLens] = useState(null);
      const [adding, setAdding] = useState(false);
      const [draft, setDraft] = useState({ what: "", who: "", due: "" });
      const [showAob, setShowAob] = useState(false);
      const [aobDraft, setAobDraft] = useState("");
      const [showTip, setShowTip] = useState(false);
      const [showCommitmentTip, setShowCommitmentTip] = useState(false);
      const notesRef = useRef();

      const lenses = {
        scope: { name: t.scope, color: "var(--blue)", bg: "var(--blue-soft)", textColor: "var(--blue-text)", question: t.scopeQuestion, description: t.scopeDesc, prompts: t.scopePrompts },
        voices: { name: t.voices, color: "var(--purple)", bg: "var(--purple-soft)", textColor: "var(--purple-text)", question: t.voicesQuestion, description: t.voicesDesc, prompts: t.voicesPrompts },
        context: { name: t.context, color: "var(--orange)", bg: "var(--orange-soft)", textColor: "var(--orange-text)", question: t.contextQuestion, description: t.contextDesc, prompts: t.contextPrompts },
      };

      const topic = session.topics[session.currentTopicIndex];
      const isLast = session.currentTopicIndex === session.topics.length - 1;
      const totalCommitments = session.topics.reduce((s, x) => s + (x.commitments?.length || 0), 0);
      const progress = ((session.currentTopicIndex + 1) / session.topics.length) * 100;
      
      const totalDurationSecs = parseInt(session.duration) * 60;
      const elapsedSecs = timerState.elapsed;
      const remainingSecs = totalDurationSecs - elapsedSecs;
      const isOvertime = remainingSecs < 0;

      const updateTopic = (u) => { const topics = [...session.topics]; topics[session.currentTopicIndex] = { ...topic, ...u }; update({ ...session, topics }); };
      const addPrompt = (text) => { updateTopic({ notes: (topic.notes || "") + (topic.notes ? "\n\n" : "") + "→ " + text + "\n" }); setActiveLens(null); setTimeout(() => notesRef.current?.focus(), 50); };
      const saveCommitment = () => { if (!draft.what.trim()) return; updateTopic({ commitments: [...(topic.commitments || []), { id: Date.now(), what: draft.what.trim(), who: draft.who.trim() || t.theGroup, due: draft.due, done: false }] }); setDraft({ what: "", who: "", due: "" }); setAdding(false); };
      const toggleCommitment = (id) => { updateTopic({ commitments: topic.commitments.map(c => c.id === id ? { ...c, done: !c.done } : c) }); };
      
      const handleNext = () => { if (skipPause) { goNext(); } else { setShowPause(true); } };
      const goNext = () => { setShowPause(false); setActiveLens(null); if (isLast) goToReview(); else update({ ...session, currentTopicIndex: session.currentTopicIndex + 1 }); };
      const goPrev = () => { if (session.currentTopicIndex > 0) { setActiveLens(null); update({ ...session, currentTopicIndex: session.currentTopicIndex - 1 }); } };
      const addToAob = () => { if (!aobDraft.trim()) return; update({ ...session, aobTopics: [...(session.aobTopics || []), { id: Date.now(), title: aobDraft.trim() }] }); setAobDraft(""); };
      const removeFromAob = (id) => update({ ...session, aobTopics: session.aobTopics.filter(p => p.id !== id) });
      const restoreFromAob = (aob) => { update({ ...session, topics: [...session.topics, { id: Date.now(), title: aob.title, notes: "", commitments: [], timeEstimate: "" }], aobTopics: session.aobTopics.filter(p => p.id !== aob.id) }); };

      const TimerDisplay = () => (
        <div className="card" style={{ padding: 16 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", display: "flex", alignItems: "center", gap: 6 }}>
              {Icon.clock} {isOvertime ? t.timeOver : t.timeRemaining}
            </div>
            {timerState.running && <span className="animate-pulse" style={{ width: 10, height: 10, borderRadius: "50%", background: isOvertime ? "var(--red)" : "var(--green)" }} />}
          </div>
          <div className={`timer-display ${isOvertime ? "timer-overtime" : ""}`} style={{ fontSize: "1.75rem", fontWeight: 500, marginBottom: 10 }}>
            {isOvertime && "+"}{formatTime(remainingSecs)}
          </div>
          <button onClick={() => onTimerAction(timerState.running ? "pause" : "start")} className="btn" style={{ width: "100%", padding: "12px", fontSize: "0.9375rem", background: timerState.running ? "var(--orange-soft)" : "var(--accent)", color: timerState.running ? "var(--orange-text)" : "white", fontWeight: 600, borderRadius: 8 }}>
            {timerState.running ? t.pauseTimer : t.startTimer}
          </button>
          {elapsedSecs > 0 && (
            <div style={{ fontSize: "0.75rem", color: "var(--text-muted)", marginTop: 10, textAlign: "center" }}>
              {t.totalTime}: {formatTime(elapsedSecs)}
            </div>
          )}
        </div>
      );

      return (
        <div className="room-layout" style={{ display: "grid", gridTemplateColumns: "220px 1fr", gap: 20, minHeight: "calc(100vh - 140px)", width: "100%" }}>
          {showPause && <PauseModal onContinue={goNext} onBack={() => setShowPause(false)} isLast={isLast} onSkipChange={setSkipPause} />}
          
          {/* Mobile timer */}
          <div className="mobile-only mobile-timer-section no-print">
            <TimerDisplay />
          </div>
          
          <aside className="no-print room-sidebar" style={{ display: "flex", flexDirection: "column", gap: 14, minWidth: 0 }}>
            <div className="desktop-only">
              <TimerDisplay />
            </div>
            
            <div>
              <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 8, textTransform: "uppercase", padding: "0 4px" }}>{t.progress}</div>
              <div className="progress-bar"><div className="progress-fill" style={{ width: progress + "%" }} /></div>
              <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 6, padding: "0 4px" }}>{session.currentTopicIndex + 1} {t.of} {session.topics.length}</div>
            </div>
            <div style={{ flex: 1, overflow: "auto", minWidth: 0 }}>
              <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 10, textTransform: "uppercase", padding: "0 4px" }}>{t.agenda}</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                {session.topics.map((x, i) => (
                  <button key={x.id} onClick={() => { setActiveLens(null); update({ ...session, currentTopicIndex: i }); }} style={{ textAlign: "left", padding: 12, borderRadius: 10, border: i === session.currentTopicIndex ? "2px solid var(--accent)" : "1px solid transparent", background: i === session.currentTopicIndex ? "var(--bg-card)" : "transparent", cursor: "pointer", fontFamily: "inherit", minHeight: 48, width: "100%", display: "block" }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: "0.6875rem", color: "var(--text-muted)", marginBottom: 4 }}>
                      <span>{String(i + 1).padStart(2, "0")}</span>
                      {x.commitments?.length > 0 && <span style={{ color: "var(--green-text)", fontWeight: 600 }}>{x.commitments.length}✓</span>}
                    </div>
                    <div className="sidebar-topic-text" style={{ fontWeight: i === session.currentTopicIndex ? 600 : 400, color: i === session.currentTopicIndex ? "var(--text)" : "var(--text-secondary)" }}>{x.title || t.untitledTopic}</div>
                  </button>
                ))}
              </div>
            </div>
            {totalCommitments > 0 && <button onClick={goToReview} className="btn btn-secondary btn-small" style={{ justifyContent: "center" }}><span style={{ width: 20, height: 20, borderRadius: "50%", background: "var(--green)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "0.6875rem", fontWeight: 700 }}>{totalCommitments}</span> {t.viewAll}</button>}
            <button onClick={() => setShowAob(!showAob)} className="btn btn-ghost btn-small" style={{ justifyContent: "center", fontSize: "0.8125rem" }}>{t.aob} {session.aobTopics?.length > 0 && `(${session.aobTopics.length})`}</button>
          </aside>

          <main className="card room-main" style={{ padding: 24, display: "flex", flexDirection: "column", overflow: "hidden", minWidth: 0 }}>
            {session.intention && <div className="intention-banner no-print" style={{ marginBottom: 16 }}><span style={{ color: "var(--blue-text)" }}>{Icon.target}</span><span style={{ fontSize: "1rem", color: "var(--text-secondary)" }}><strong>{t.goal}:</strong> {session.intention}</span></div>}
            
            {session.currentTopicIndex === 0 && (
              <div className="no-print" style={{ marginBottom: 16 }}><TipBox text={t.tipRoomStart} show={showTip} onToggle={() => setShowTip(!showTip)} /></div>
            )}
            
            <div className="animate-in" style={{ marginBottom: 16 }}>
              <div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", marginBottom: 6, textTransform: "uppercase" }}>{t.topic} {session.currentTopicIndex + 1} {t.of} {session.topics.length}</div>
              <h1 className="font-serif" style={{ fontSize: "clamp(1.625rem, 5vw, 2.25rem)", lineHeight: 1.2 }}>{topic.title || t.untitledTopic}</h1>
            </div>
            <div style={{ flex: 1, marginBottom: 16, minHeight: 100, background: "var(--bg-secondary)", borderRadius: "var(--radius)", padding: 4 }}>
              <AutoTextarea ref={notesRef} value={topic.notes || ""} onChange={e => updateTopic({ notes: e.target.value })} placeholder={t.notesPlaceholder} style={{ fontSize: "1.0625rem", lineHeight: 1.6, minHeight: 100, padding: 16 }} />
            </div>
            {showAob && (
              <div className="aob-box animate-scale no-print" style={{ marginBottom: 16 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                  <div>
                    <span style={{ fontWeight: 600, color: "var(--purple-text)", fontSize: "1rem" }}>{t.aob}</span>
                    <p style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 3 }}>{t.aobDesc}</p>
                  </div>
                  <button onClick={() => setShowAob(false)} className="btn btn-ghost btn-icon">{Icon.x}</button>
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <input value={aobDraft} onChange={e => setAobDraft(e.target.value)} placeholder={t.aobPlaceholder} className="input input-small" style={{ flex: 1 }} onKeyDown={e => e.key === "Enter" && addToAob()} />
                  <button onClick={addToAob} disabled={!aobDraft.trim()} className="btn btn-secondary btn-small">{Icon.plus}</button>
                </div>
                {session.aobTopics?.length > 0 ? (
                  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                    {session.aobTopics.map(p => (
                      <div key={p.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", background: "var(--bg-card)", borderRadius: 8, fontSize: "0.9375rem", gap: 10, minHeight: 48 }}>
                        <span style={{ flex: 1, minWidth: 0 }}>{p.title}</span>
                        <div style={{ display: "flex", gap: 6 }}>
                          <button onClick={() => restoreFromAob(p)} className="btn btn-ghost btn-small">{t.addToAgenda}</button>
                          <button onClick={() => removeFromAob(p.id)} className="btn btn-ghost btn-icon" style={{ opacity: 0.5 }}>{Icon.x}</button>
                        </div>
                      </div>
                    ))}
                  </div>
                ) : <p style={{ textAlign: "center", color: "var(--text-muted)", fontSize: "0.8125rem", padding: 10 }}>{t.noAob}</p>}
              </div>
            )}
            <div className="no-print" style={{ marginBottom: 16 }}>
              <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginBottom: 8 }}>{t.needToSurface}</div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                {Object.entries(lenses).map(([k, v]) => <button key={k} onClick={() => setActiveLens(activeLens === k ? null : k)} className="btn btn-small" style={{ background: activeLens === k ? v.color : v.bg, color: activeLens === k ? "white" : v.textColor, fontWeight: 600 }}>{v.name}</button>)}
              </div>
              {activeLens && (
                <div className="animate-scale" style={{ marginTop: 12, padding: 14, background: lenses[activeLens].bg, borderRadius: "var(--radius)", borderLeft: "3px solid " + lenses[activeLens].color }}>
                  <div style={{ fontWeight: 600, marginBottom: 4, color: lenses[activeLens].textColor, fontSize: "1rem" }}>{lenses[activeLens].question}</div>
                  <div style={{ fontSize: "0.8125rem", color: "var(--text-secondary)", marginBottom: 10 }}>{lenses[activeLens].description}</div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>{lenses[activeLens].prompts.map((p, i) => <button key={i} onClick={() => addPrompt(p)} className="btn btn-secondary btn-small" style={{ background: "var(--bg-card)", fontSize: "0.8125rem" }}>{p}</button>)}</div>
                </div>
              )}
            </div>
            <div style={{ borderTop: "1px solid var(--border-light)", paddingTop: 16 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, gap: 10 }}>
                <span style={{ fontWeight: 600, fontSize: "1rem" }}>{t.whatWeAgreed}</span>
                <div style={{ display: "flex", gap: 8 }}>
                  {!adding && <TipBox text={t.tipCommitment} show={false} onToggle={() => setShowCommitmentTip(!showCommitmentTip)} />}
                  {!adding && <button onClick={() => setAdding(true)} className="btn btn-primary btn-small">{Icon.plus} {t.captureCommitment}</button>}
                </div>
              </div>
              {showCommitmentTip && !adding && <div style={{ marginBottom: 12 }}><TipBox text={t.tipCommitment} show={true} onToggle={() => setShowCommitmentTip(false)} /></div>}
              {adding && (
                <div className="animate-scale" style={{ padding: 14, background: "var(--bg-secondary)", borderRadius: "var(--radius)", marginBottom: 12 }}>
                  <input value={draft.what} onChange={e => setDraft({ ...draft, what: e.target.value })} placeholder={t.commitmentWhatPlaceholder} className="input" style={{ marginBottom: 10 }} autoFocus onKeyDown={e => e.key === "Enter" && draft.what.trim() && saveCommitment()} />
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 12 }} className="mobile-grid-1">
                    <input value={draft.who} onChange={e => setDraft({ ...draft, who: e.target.value })} placeholder={t.commitmentWhoPlaceholder} className="input input-small" />
                    <input type="date" value={draft.due} onChange={e => setDraft({ ...draft, due: e.target.value })} className="input input-small" />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <button onClick={saveCommitment} disabled={!draft.what.trim()} className="btn btn-primary btn-small">{Icon.check} {t.save}</button>
                    <button onClick={() => { setAdding(false); setDraft({ what: "", who: "", due: "" }); }} className="btn btn-ghost btn-small">{t.cancel}</button>
                  </div>
                </div>
              )}
              {topic.commitments?.length > 0 ? (
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {topic.commitments.map(c => (
                    <div key={c.id} style={{ padding: 14, background: c.done ? "var(--bg-secondary)" : "var(--green-soft)", borderRadius: 10, borderLeft: `3px solid ${c.done ? "var(--border)" : "var(--green)"}`, display: "flex", alignItems: "start", gap: 12, opacity: c.done ? 0.7 : 1 }}>
                      <Checkbox checked={c.done} onChange={() => toggleCommitment(c.id)} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontWeight: 500, textDecoration: c.done ? "line-through" : "none", fontSize: "1rem" }}>{c.what}</div>
                        <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", marginTop: 4, display: "flex", flexWrap: "wrap", gap: 10 }}>
                          <span>{c.who}</span>
                          {c.due && <span style={{ display: "flex", alignItems: "center", gap: 4 }}>{Icon.calendar} {c.due}</span>}
                        </div>
                      </div>
                      <button onClick={() => updateTopic({ commitments: topic.commitments.filter(x => x.id !== c.id) })} className="btn btn-ghost btn-icon" style={{ opacity: 0.4 }}>{Icon.x}</button>
                    </div>
                  ))}
                </div>
              ) : <p style={{ textAlign: "center", padding: 16, color: "var(--text-muted)", fontSize: "0.9375rem" }}>{t.noCommitmentsYet}</p>}
            </div>
            <div className="no-print" style={{ display: "flex", justifyContent: "space-between", marginTop: 16, paddingTop: 16, borderTop: "1px solid var(--border-light)", gap: 14 }}>
              <button onClick={goPrev} disabled={session.currentTopicIndex === 0} className="btn btn-ghost">{Icon.back} {t.previous}</button>
              <button onClick={handleNext} className="btn btn-primary">{isLast ? t.finish : t.nextTopic} {Icon.arrow}</button>
            </div>
          </main>
        </div>
      );
    };

    const ReviewPhase = ({ session, update, onSave, timerState }) => {
      const { t } = useLang();
      const [copied, setCopied] = useState(false);
      const [filter, setFilter] = useState("all");
      const allCommitments = session.topics.flatMap(x => (x.commitments || []).map(c => ({ ...c, topic: x.title, topicId: x.id })));
      const filtered = filter === "all" ? allCommitments : filter === "done" ? allCommitments.filter(c => c.done) : allCommitments.filter(c => !c.done);
      const doneCount = allCommitments.filter(c => c.done).length;

      const toggleCommitment = (topicId, commitmentId) => {
        const topics = session.topics.map(topic => topic.id === topicId ? { ...topic, commitments: topic.commitments.map(c => c.id === commitmentId ? { ...c, done: !c.done } : c) } : topic);
        update({ ...session, topics });
      };

      const copyText = async () => {
        let s = `${t.exportTitle.toUpperCase()}\n\n`;
        s += `${session.title}\n${session.date} | ${session.time} to ${calcEndTime(session.time, session.duration)}\n`;
        if (session.facilitator) s += `${t.facilitator}: ${session.facilitator}\n`;
        if (session.attendees) s += `${t.attendees}: ${session.attendees}\n`;
        if (session.intention) s += `\n${t.goal}: ${session.intention}\n`;
        s += `\n${t.totalTime}: ${formatTime(timerState.elapsed)}\n`;
        s += `\n${t.commitments.toUpperCase()}\n\n`;
        if (!allCommitments.length) s += `${t.noCommitmentsCaptured}\n`;
        else allCommitments.forEach(c => { s += `${c.done ? "☑" : "☐"} ${c.what}\n   ${c.who}${c.due ? ` | ${t.dueDate}: ${c.due}` : ""}\n   (${c.topic})\n\n`; });
        if (session.aobTopics?.length > 0) { s += `\n${t.aob.toUpperCase()}\n\n`; session.aobTopics.forEach(p => { s += `• ${p.title}\n`; }); }
        s += `\n\n${t.exportFacilitatedWith}`;
        try { await navigator.clipboard.writeText(s); setCopied(true); setTimeout(() => setCopied(false), 2000); } catch {}
      };

      return (
        <div className="animate-in" style={{ maxWidth: 600, margin: "0 auto", width: "100%" }}>
          <div style={{ textAlign: "center", marginBottom: 28 }}>
            <div style={{ width: 48, height: 48, borderRadius: 12, background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 14px", fontSize: "1.125rem" }}>◐</div>
            <h1 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 6 }}>{session.title}</h1>
            <p style={{ color: "var(--text-muted)", fontSize: "0.9375rem" }}>{session.date} · {session.time} to {calcEndTime(session.time, session.duration)}</p>
            {session.attendees && <p style={{ marginTop: 8, color: "var(--text-secondary)", fontSize: "0.875rem", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>{Icon.users} {session.attendees}</p>}
            {session.intention && <p style={{ marginTop: 10, color: "var(--text-secondary)", fontSize: "1rem", maxWidth: 440, margin: "10px auto 0" }}>{session.intention}</p>}
            <p style={{ marginTop: 12, fontSize: "0.9375rem", color: "var(--text-muted)" }}>{t.totalTime}: <strong>{formatTime(timerState.elapsed)}</strong></p>
          </div>
          <div className="no-print" style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 20, flexWrap: "wrap" }}>
            <button onClick={copyText} className="btn btn-secondary btn-small">{copied ? Icon.check : Icon.copy} {copied ? t.copied : t.copy}</button>
            <button onClick={() => window.print()} className="btn btn-secondary btn-small">{Icon.print} {t.print}</button>
            <button onClick={() => exportSession(session, t)} className="btn btn-secondary btn-small">{Icon.download} {t.exportSession}</button>
            <button onClick={onSave} className="btn btn-secondary btn-small">{Icon.check} {t.save}</button>
          </div>
          <div style={{ marginBottom: 28 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
              <h2 style={{ fontWeight: 600, fontSize: "1.0625rem" }}>{t.ourCommitments} <span style={{ color: "var(--text-muted)", fontWeight: 400 }}>({doneCount}/{allCommitments.length})</span></h2>
              <div className="no-print" style={{ display: "flex", gap: 6 }}>
                {[["all", t.allCommitments], ["pending", t.pending], ["done", t.completed]].map(([val, label]) => (
                  <button key={val} onClick={() => setFilter(val)} className="btn btn-small" style={{ background: filter === val ? "var(--accent)" : "var(--bg-secondary)", color: filter === val ? "white" : "var(--text-muted)" }}>{label}</button>
                ))}
              </div>
            </div>
            {!filtered.length ? (
              <div className="card" style={{ padding: 24, textAlign: "center" }}>
                <p style={{ color: "var(--text-muted)", fontSize: "1rem" }}>{filter === "all" ? t.noCommitmentsCaptured : `No ${filter} commitments`}</p>
                {filter === "all" && <button onClick={() => update({ ...session, phase: "room" })} className="btn btn-secondary" style={{ marginTop: 14 }}>{t.goBackAndAdd}</button>}
              </div>
            ) : (
              <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                {filtered.map(c => (
                  <div key={c.id} className="card" style={{ padding: 16, display: "flex", alignItems: "start", gap: 14, opacity: c.done ? 0.7 : 1 }}>
                    <Checkbox checked={c.done} onChange={() => toggleCommitment(c.topicId, c.id)} />
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 500, marginBottom: 6, textDecoration: c.done ? "line-through" : "none", fontSize: "1.0625rem" }}>{c.what}</div>
                      <div style={{ fontSize: "0.8125rem", color: "var(--text-muted)", display: "flex", flexWrap: "wrap", gap: 10 }}>
                        <span>{c.who}</span>
                        {c.due && <span style={{ display: "flex", alignItems: "center", gap: 5 }}>{Icon.calendar} {c.due}</span>}
                        <span>({c.topic})</span>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
          {session.aobTopics?.length > 0 && (
            <div style={{ marginBottom: 28 }}>
              <h3 style={{ fontWeight: 600, marginBottom: 12, fontSize: "1rem" }}>{t.aob}</h3>
              <div className="aob-box">{session.aobTopics.map(p => (<div key={p.id} style={{ padding: "10px 0", borderBottom: "1px solid var(--purple)", fontSize: "1rem" }}>{p.title}</div>))}</div>
            </div>
          )}
          {session.topics.some(x => x.notes?.trim()) && (
            <div className="print-break" style={{ borderTop: "1px solid var(--border-light)", paddingTop: 20 }}>
              <h3 style={{ fontWeight: 600, marginBottom: 14, fontSize: "1rem" }}>{t.discussionNotes}</h3>
              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                {session.topics.filter(x => x.notes?.trim()).map(x => (
                  <div key={x.id}>
                    <div style={{ fontWeight: 600, marginBottom: 6, fontSize: "1rem" }}>{x.title}</div>
                    <div style={{ color: "var(--text-secondary)", whiteSpace: "pre-wrap", lineHeight: 1.6, fontSize: "0.9375rem" }}>{x.notes}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
          <div style={{ marginTop: 28, paddingTop: 14, borderTop: "1px solid var(--border-light)", textAlign: "center", color: "var(--text-muted)", fontSize: "0.8125rem" }}>{t.agreedInTheRoom}</div>
          <div className="no-print" style={{ textAlign: "center", marginTop: 20 }}>
            <button onClick={() => update({ ...session, phase: "home" })} className="btn btn-ghost">{Icon.back} {t.backToHome}</button>
            <span style={{ margin: "0 10px", color: "var(--text-muted)" }}>·</span>
            <button onClick={() => { if (confirm(t.confirmStartOver)) { save(null); update(null); } }} className="btn btn-ghost">{Icon.refresh} {t.newSession}</button>
          </div>
        </div>
      );
    };

    // =============================================
    // MAIN APP
    // =============================================
    const App = () => {
      const [session, setSession] = useState(() => load() || null);
      const [showHelp, setShowHelp] = useState(false);
      const [showSaved, setShowSaved] = useState(false);
      const [lang, setLangState] = useState(loadLang);
      const [timerState, setTimerState] = useState({ running: false, elapsed: 0, startedAt: null });

      const setLang = (l) => { setLangState(l); saveLang(l); };
      const t = translations[lang];

      const update = useCallback((s) => { setSession(s); if (s) save(s); }, []);
      const setPhase = (p) => update({ ...session, phase: p });
      const canEnterRoom = session?.title?.trim() && session?.topics?.some(x => x.title?.trim());

      useEffect(() => {
        if (!timerState.running) return;
        const i = setInterval(() => { setTimerState(prev => ({ ...prev, elapsed: prev.elapsed + 1 })); }, 1000);
        return () => clearInterval(i);
      }, [timerState.running]);

      const handleTimerAction = (action) => {
        if (action === "start") setTimerState(prev => ({ ...prev, running: true, startedAt: Date.now() }));
        else if (action === "pause") setTimerState(prev => ({ ...prev, running: false }));
      };

      useEffect(() => {
        const handleKey = (e) => {
          if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
          if (session?.phase === "room") {
            if (e.key === "ArrowRight" || e.key === "n") { if (session.currentTopicIndex < session.topics.length - 1) update({ ...session, currentTopicIndex: session.currentTopicIndex + 1 }); }
            if (e.key === "ArrowLeft" || e.key === "p") { if (session.currentTopicIndex > 0) update({ ...session, currentTopicIndex: session.currentTopicIndex - 1 }); }
            if (e.key === "t") handleTimerAction(timerState.running ? "pause" : "start");
          }
          if ((e.metaKey || e.ctrlKey) && e.key === "s") { e.preventDefault(); if (session) { addToHistory(session); setShowSaved(true); setTimeout(() => setShowSaved(false), 1500); } }
        };
        window.addEventListener("keydown", handleKey);
        return () => window.removeEventListener("keydown", handleKey);
      }, [session, update, timerState.running]);

      const handleSave = () => { if (session) { addToHistory(session); setShowSaved(true); setTimeout(() => setShowSaved(false), 1500); } };
      const startFromTemplate = (template) => { update(createSession(template, lang)); setTimerState({ running: false, elapsed: 0, startedAt: null }); };
      const openSession = (s) => update({ ...s, phase: s.phase === "home" ? "review" : s.phase });
      const importSession = (s) => update({ ...s, phase: "review", id: Date.now().toString(36) });
      const continueSession = () => { if (session && session.phase !== "home") setPhase(session.phase); else setPhase("setup"); };

      if (!session || session.phase === "home") {
        return (
          <LangContext.Provider value={{ t, lang, setLang }}>
            <LandingPage currentSession={session} onStart={startFromTemplate} onContinue={continueSession} onOpenSession={openSession} onImport={importSession} />
          </LangContext.Provider>
        );
      }

      return (
        <LangContext.Provider value={{ t, lang, setLang }}>
          <SaveIndicator show={showSaved} />
          {showHelp && <HelpModal onClose={() => setShowHelp(false)} />}
          <div style={{ minHeight: "100vh", display: "flex", flexDirection: "column", overflow: "hidden", width: "100%" }}>
            <header className="no-print" style={{ padding: "12px 18px", borderBottom: "1px solid var(--border-light)", background: "var(--bg-card)", width: "100%" }}>
              <div style={{ maxWidth: 1100, margin: "0 auto", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 14 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 10, flexShrink: 0 }}>
                  <button onClick={() => setPhase("home")} style={{ width: 36, height: 36, borderRadius: 9, background: "var(--accent)", color: "white", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "1rem", border: "none", cursor: "pointer" }}>◐</button>
                  <span className="desktop-only" style={{ fontWeight: 600, fontSize: "1rem" }}>{t.appName}</span>
                </div>
                <PhaseNav phase={session.phase} setPhase={setPhase} canEnterRoom={canEnterRoom} />
                <MobileNav phase={session.phase} setPhase={setPhase} canEnterRoom={canEnterRoom} />
                <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
                  <LangToggle lang={lang} setLang={setLang} />
                  <button onClick={() => setShowHelp(true)} className="btn btn-ghost btn-icon" title={t.howThisWorks}>{Icon.help}</button>
                  <button onClick={() => { if (confirm(t.startOver)) { save(null); update(null); } }} className="btn btn-ghost btn-icon" title={t.newSession}>{Icon.refresh}</button>
                </div>
              </div>
            </header>
            <main style={{ flex: 1, padding: "20px 18px", overflowX: "hidden", width: "100%" }} className="mobile-p-sm">
              <div style={{ maxWidth: 1100, margin: "0 auto", width: "100%" }}>
                {session.phase === "setup" && <SetupPhase session={session} update={update} />}
                {session.phase === "agenda" && <AgendaPhase session={session} update={update} />}
                {session.phase === "room" && <RoomPhase session={session} update={update} goToReview={() => setPhase("review")} timerState={timerState} onTimerAction={handleTimerAction} />}
                {session.phase === "review" && <ReviewPhase session={session} update={update} onSave={handleSave} timerState={timerState} />}
              </div>
            </main>
            {(session.phase === "setup" || session.phase === "agenda") && (
              <footer className="no-print" style={{ padding: "14px 18px", borderTop: "1px solid var(--border-light)", background: "var(--bg-card)" }}>
                <div style={{ maxWidth: 560, margin: "0 auto", display: "flex", justifyContent: "space-between" }}>
                  {session.phase === "agenda" ? (
                    <>
                      <button onClick={() => setPhase("setup")} className="btn btn-ghost">{Icon.back}</button>
                      <button onClick={() => setPhase("room")} disabled={!canEnterRoom} className="btn btn-primary">{t.enterTheRoom} {Icon.arrow}</button>
                    </>
                  ) : (
                    <>
                      <div />
                      <button onClick={() => setPhase("agenda")} className="btn btn-primary">{t.buildAgenda} {Icon.arrow}</button>
                    </>
                  )}
                </div>
              </footer>
            )}
          </div>
        </LangContext.Provider>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
