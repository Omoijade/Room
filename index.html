  <title>The Room</title>
  <meta name="description" content="A facilitation surface for decisions that stick." />

  <style>
    :root {
      --bg: #F5F5F7; --bg-card: #FFFFFF; --bg-secondary: #FAFAFA; --bg-dark: #1D1D1F;
      --accent: #1D1D1F; --accent-soft: #E8E8ED;
      --text: #1D1D1F; --text-secondary: #6E6E73; --text-muted: #AEAEB2; --text-on-dark: #F5F5F7;
      --border: #D2D2D7; --border-light: #E8E8ED;
      --green: #34C759; --green-soft: #E8FAE8; --green-text: #248A3D;
      --blue: #007AFF; --blue-soft: #E5F2FF; --blue-text: #0055D4;
      --purple: #AF52DE; --purple-soft: #F5E6FA; --purple-text: #8944AB;
      --orange: #FF9500; --orange-soft: #FFF4E5; --orange-text: #C45D00;
      --yellow: #FFCC00; --yellow-soft: #FFF9E5; --yellow-text: #996600;
      --red: #FF3B30; --red-soft: #FFE5E5; --red-text: #D70015;
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --touch-target: 44px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; line-height: 1.5; letter-spacing: -0.022em;
      -webkit-tap-highlight-color: transparent;
    }
    .font-serif { font-family: "DM Serif Display", "New York", Georgia, serif; letter-spacing: -0.01em; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes saveFlash { 0% { opacity: 0; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.5s ease, slideUp 0.5s ease; animation-fill-mode: both; }
    .animate-fade { animation: fadeIn 0.25s ease; }
    .animate-scale { animation: scaleIn 0.2s ease; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pulse { animation: pulse 1.5s ease infinite; }
    .animate-save { animation: saveFlash 1.5s ease; }
    .animate-dropdown { animation: slideDown 0.2s ease; }
    .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; }
    *:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media print {
      .no-print { display: none !important; }
      body { background: white; font-size: 12pt; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
      .print-break { page-break-before: always; }
    }

    @media (max-width: 768px) {
      html { font-size: 16px; }
      .desktop-only { display: none !important; }
      .mobile-stack { flex-direction: column !important; }
      .mobile-full { width: 100% !important; min-width: 0 !important; }
      .mobile-grid-1 { grid-template-columns: 1fr !important; }
      .mobile-grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
      .room-layout { display: flex !important; flex-direction: column !important; }
      .room-sidebar { width: 100% !important; margin-top: 16px; }
      .room-main { order: 2; }
      .mobile-timer-section { order: 1; margin-bottom: 16px; }
      .mobile-show { display: flex !important; }
      .mobile-p-sm { padding: 14px !important; }
    }
    @media (min-width: 769px) {
      .mobile-only { display: none !important; }
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit; font-weight: 600; border-radius: var(--radius); cursor: pointer;
      border: none; transition: all 0.2s ease; letter-spacing: -0.01em;
      min-height: var(--touch-target);
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn-primary { background: var(--accent); color: white; padding: 14px 28px; font-size: 1rem; }
    .btn-primary:hover:enabled { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; font-size: 1rem; }
    .btn-secondary:hover:enabled { background: var(--bg-secondary); border-color: var(--text-muted); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 10px 16px; font-size: 0.9375rem; }
    .btn-ghost:hover { background: var(--accent-soft); color: var(--text); }
    .btn-small { padding: 10px 16px; font-size: 0.875rem; border-radius: 8px; min-height: 40px; }
    .btn-icon { padding: 10px; border-radius: 8px; min-width: var(--touch-target); }
    .btn-large { padding: 18px 36px; font-size: 1.0625rem; border-radius: var(--radius-lg); }

    .input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; background: var(--bg-card); color: var(--text); transition: all 0.15s;
      min-height: var(--touch-target);
    }
    .input::placeholder { color: var(--text-muted); }
    .input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px var(--blue-soft); }
    .input-small { padding: 12px 14px; font-size: 0.9375rem; }

    .textarea-auto {
      width: 100%; min-height: 60px; padding: 16px; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: inherit; line-height: 1.5; background: transparent;
      color: var(--text); resize: none; overflow: hidden;
    }
    .textarea-auto:focus { outline: none; }
    .textarea-auto::placeholder { color: var(--text-muted); }

    .card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
    .progress-bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s ease; }

    .intention-banner {
      background: linear-gradient(135deg, var(--blue-soft) 0%, var(--purple-soft) 100%);
      border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    }

    .lang-toggle { display: flex; align-items: center; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: 8px; font-size: 0.875rem; }
    .lang-toggle button { padding: 8px 12px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; font-family: inherit; min-height: 36px; }
    .lang-toggle button.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow-sm); }

    .topic-row { display: flex; align-items: center; gap: 10px; padding: 14px; background: var(--bg-secondary); border-radius: 10px; transition: all 0.15s; min-height: var(--touch-target); }
    .topic-row:hover { background: var(--accent-soft); }
    .topic-row .reorder-btns { opacity: 0; transition: opacity 0.15s; }
    .topic-row:hover .reorder-btns { opacity: 1; }

    .aob-box { background: var(--purple-soft); border: 1px solid var(--purple); border-radius: var(--radius); padding: 18px; }

    .checkbox { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
    .checkbox.checked { background: var(--green); border-color: var(--green); color: white; }
    .checkbox:hover { border-color: var(--green); }

    .session-card { padding: 18px; border: 1px solid var(--border-light); border-radius: var(--radius); transition: all 0.2s; cursor: pointer; background: var(--bg-card); min-height: var(--touch-target); }
    .session-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }

    .template-card { padding: 16px; border: 2px solid var(--border-light); border-radius: var(--radius-lg); transition: all 0.2s; cursor: pointer; text-align: left; background: var(--bg-card); }
    .template-card:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .template-card.selected { border-color: var(--accent); background: var(--accent-soft); }

    .tip-box { padding: 16px 18px; background: var(--blue-soft); border-radius: var(--radius); font-size: 0.9375rem; color: var(--blue-text); line-height: 1.5; }

    .save-indicator { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; background: var(--green); color: white; border-radius: var(--radius); font-size: 0.9375rem; font-weight: 500; display: flex; align-items: center; gap: 8px; z-index: 100; }

    .mobile-nav { position: relative; }
    .mobile-nav-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 50; margin-top: 4px; overflow: hidden; min-width: 200px; }
    .mobile-nav-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border-light); cursor: pointer; font-weight: 500; min-height: var(--touch-target); font-size: 1rem; }
    .mobile-nav-item:last-child { border-bottom: none; }
    .mobile-nav-item:hover { background: var(--bg-secondary); }
    .mobile-nav-item.active { background: var(--accent-soft); color: var(--accent); }
    .mobile-nav-item.disabled { opacity: 0.4; cursor: default; }

    .timer-display { font-family: ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .timer-overtime { color: var(--red-text); }

    .template-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
    .template-topic { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 0.9375rem; color: var(--text-secondary); }
    .template-topic-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; font-weight: 600; flex-shrink: 0; }
    
    .sidebar-topic-text { font-size: 0.875rem; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; hyphens: auto; }

    .participant-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg-secondary); border-radius: 20px; font-size: 0.875rem; }
    .participant-chip.present { background: var(--green-soft); color: var(--green-text); }
    .participant-chip.absent { background: var(--bg-secondary); color: var(--text-muted); }

    /* Mini mode styles */
    .mini-mode-container { 
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg); padding: 16px; height: 100%; display: flex; flex-direction: column;
      font-size: 14px; color: var(--text);
    }
    .mini-mode-container * { box-sizing: border-box; }
  </style>

    const LangContext = createContext();
    const useLang = () => useContext(LangContext);

    const STORAGE_KEY = "the-room-v16";

    const saveTimer = (t) => { try { if (t) localStorage.setItem(TIMER_KEY, JSON.stringify(t)); else localStorage.removeItem(TIMER_KEY); } catch {} };

    const getTemplates = (lang) => ({
      blank: { title: "", duration: "60", topics: [{ id: Date.now(), title: "", notes: "", commitments: [] }] },
      strategy: {

    const createSession = (template = "blank", lang = "en") => {
      const templates = getTemplates(lang);
      const tmpl = templates[template] || templates.blank;
      return {
        id: Date.now().toString(36), title: tmpl.title, intention: "", facilitator: "", attendees: "",
        date: new Date().toISOString().split("T")[0], time: "10:00", duration: tmpl.duration,
        topics: tmpl.topics.map(t => ({ ...t, id: Date.now() + Math.random() })),
        aobTopics: [], currentTopicIndex: 0, phase: "setup",
        participants: [], // NEW: array of { id, name, present }
      };
    };

    const load = () => { try { const s = localStorage.getItem(STORAGE_KEY); if (s) { const p = JSON.parse(s); if (p.title !== undefined || p.phase) return { ...createSession(), ...p, participants: p.participants || [] }; } return null; } catch { return null; } };
    const save = (s) => { try { if (s) localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); else localStorage.removeItem(STORAGE_KEY); } catch {} };
    const loadLang = () => { try { return localStorage.getItem(LANG_KEY) || "en"; } catch { return "en"; } };
    const saveLang = (l) => { try { localStorage.setItem(LANG_KEY, l); } catch {} };
    const loadHistory = () => { try { const h = localStorage.getItem(HISTORY_KEY); return h ? JSON.parse(h) : []; } catch { return []; } };
    const saveHistory = (h) => { try { localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 30))); } catch {} };
    const addToHistory = (s) => { const h = loadHistory(); const i = h.findIndex(x => x.id === s.id); if (i >= 0) h[i] = s; else h.unshift(s); saveHistory(h); };
    const loadSkipPause = () => { try { return localStorage.getItem(SKIP_PAUSE_KEY) === "true"; } catch { return false; } };
    const saveSkipPause = (v) => { try { localStorage.setItem(SKIP_PAUSE_KEY, v ? "true" : "false"); } catch {} };

    const Icon = {

      upload: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>,

      chevronDown: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>,
      float: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>,
      user: <svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
      undo: <svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6.36 2.64L3 13"/></svg>,
    };

    const formatTime = (secs) => { const absSecs = Math.abs(secs); const mins = Math.floor(absSecs / 60); const s = absSecs % 60; return `${mins}:${s.toString().padStart(2, "0")}`; };
    const calcEndTime = (start, mins) => { if (!start) return ""; const [h, m] = start.split(":").map(Number); const d = new Date(); d.setHours(h, m + parseInt(mins || 0)); return d.toTimeString().slice(0, 5); };
    const formatDate = (d) => { try { return new Date(d).toLocaleDateString(undefined, { month: "short", day: "numeric" }); } catch { return d; } };

    const AutoTextarea = ({ value, onChange, placeholder, className = "", style = {}, ...props }) => {
      const ref = useRef(null);
      useLayoutEffect(() => { if (ref.current) { ref.current.style.height = "auto"; ref.current.style.height = ref.current.scrollHeight + "px"; } }, [value]);
      return <textarea ref={ref} value={value} onChange={onChange} placeholder={placeholder} className={"textarea-auto " + className} style={style} rows={1} {...props} />;
    };

    const LangToggle = ({ lang, setLang }) => (
      <div className="lang-toggle">
        <button onClick={() => setLang("en")} className={lang === "en" ? "active" : ""}>EN</button>
        <button onClick={() => setLang("fr")} className={lang === "fr" ? "active" : ""}>FR</button>
      </div>
    );

    const Checkbox = ({ checked, onChange }) => (
      <div className={`checkbox ${checked ? "checked" : ""}`} onClick={onChange}>{checked && Icon.check}</div>
    );

    const SaveIndicator = ({ show, text }) => show ? <div className="save-indicator animate-save">{Icon.check} {text || "Saved"}</div> : null;

    const UndoToast = ({ show, message, onUndo, onDismiss }) => {
      useEffect(() => { if (show) { const t = setTimeout(onDismiss, 5000); return () => clearTimeout(t); } }, [show, onDismiss]);
      if (!show) return null;
      return (
        <div className="animate-scale" style={{ position: "fixed", bottom: 20, left: "50%", transform: "translateX(-50%)", padding: "12px 16px", background: "#1D1D1F", color: "white", borderRadius: 12, fontSize: "0.9375rem", display: "flex", alignItems: "center", gap: 12, zIndex: 100, boxShadow: "0 4px 20px rgba(0,0,0,0.2)" }}>
          <span>{message}</span>

          <button onClick={onDismiss} style={{ background: "transparent", border: "none", color: "rgba(255,255,255,0.6)", cursor: "pointer", padding: 4 }}>{Icon.x}</button>

      if (!show) return <button onClick={onToggle} className="btn btn-ghost btn-icon" style={{ opacity: 0.6 }}>{Icon.lightbulb}</button>;

        <div className="tip-box animate-scale" style={{ position: "relative" }}>

      const { t } = useLang();
      const [open, setOpen] = useState(false);
      const phases = [{ id: "setup", label: t.setup }, { id: "agenda", label: t.agenda }, { id: "room", label: t.session, disabled: !canEnterRoom }, { id: "review", label: t.commitments }];
      const current = phases.find(p => p.id === phase);
      return (
        <div className="mobile-nav mobile-only" style={{ position: "relative" }}>
          <button onClick={() => setOpen(!open)} className="btn btn-secondary" style={{ display: "flex", alignItems: "center", gap: 8, padding: "12px 16px" }}>{Icon.menu}<span>{current?.label || t.menu}</span>{Icon.chevronDown}</button>
          {open && (<><div style={{ position: "fixed", inset: 0, zIndex: 40 }} onClick={() => setOpen(false)} /><div className="mobile-nav-dropdown animate-dropdown">{phases.map(p => (<div key={p.id} className={`mobile-nav-item ${p.id === phase ? "active" : ""} ${p.disabled ? "disabled" : ""}`} onClick={() => { if (!p.disabled) { setPhase(p.id); setOpen(false); } }}><span>{p.label}</span>{p.id === phase && Icon.check}</div>))}</div></>)}
        </div>
      );
    };

    const exportSession = (session, t) => {
      const blob = new Blob([JSON.stringify(session, null, 2)], { type: "application/json" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob);
      a.download = `${(session.title || "session").replace(/[^a-z0-9]/gi, "-")}-${session.date}.room.json`;
      a.click(); URL.revokeObjectURL(a.href);
    };

    const downloadCalendar = (session, t) => {
      const start = new Date(`${session.date}T${session.time}`);
      const end = new Date(start.getTime() + parseInt(session.duration) * 60000);
      const fmt = (d) => d.toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
      const agenda = session.topics.filter(x => x.title).map((x, i) => `${i+1}. ${x.title}`).join("\\n");
      const ics = `BEGIN:VCALENDAR\nVERSION:2.0\nBEGIN:VEVENT\nDTSTART:${fmt(start)}\nDTEND:${fmt(end)}\nSUMMARY:${session.title}\nDESCRIPTION:${session.intention ? t.goal + ": " + session.intention + "\\n\\n" : ""}${agenda}\nEND:VEVENT\nEND:VCALENDAR`;
      const blob = new Blob([ics], { type: "text/calendar" });
      const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `${session.title || "session"}.ics`; a.click();
    };

    // =============================================
    // MINI MODE (Picture-in-Picture)
    // =============================================
    const MiniModeContent = ({ session, timerState, lenses, activeLens, setActiveLens, onPrev, onNext, t }) => {
      const topic = session.topics[session.currentTopicIndex];
      const totalDurationSecs = parseInt(session.duration) * 60;
      const remainingSecs = totalDurationSecs - timerState.elapsed;
      const isOvertime = remainingSecs < 0;
      const isFirst = session.currentTopicIndex === 0;
      const isLast = session.currentTopicIndex === session.topics.length - 1;

      return (
        <div className="mini-mode-container">
          <div style={{ marginBottom: 12, paddingBottom: 10, borderBottom: "1px solid #E8E8ED" }}>
            <div style={{ fontSize: 11, color: "#6E6E73", textTransform: "uppercase", fontWeight: 600, marginBottom: 4 }}>{t.topic} {session.currentTopicIndex + 1} {t.of} {session.topics.length}</div>
            <div style={{ fontSize: 16, fontWeight: 600, lineHeight: 1.3 }}>{topic.title || t.untitledTopic}</div>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12, padding: "8px 10px", background: isOvertime ? "#FFE5E5" : "#E8FAE8", borderRadius: 8 }}>
            <span style={{ fontSize: 11, color: isOvertime ? "#D70015" : "#248A3D", fontWeight: 600 }}>{isOvertime ? t.timeOver : t.timeRemaining}</span>
            <span style={{ fontSize: 18, fontWeight: 500, fontFamily: "ui-monospace, monospace", color: isOvertime ? "#D70015" : "#248A3D" }}>{isOvertime && "+"}{formatTime(remainingSecs)}</span>
          </div>
          <div style={{ marginBottom: 12 }}>
            <div style={{ fontSize: 11, color: "#6E6E73", marginBottom: 6 }}>{t.needToSurface}</div>
            <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
              {Object.entries(lenses).map(([k, v]) => (
                <button key={k} onClick={() => setActiveLens(activeLens === k ? null : k)} style={{ padding: "6px 10px", fontSize: 12, fontWeight: 600, border: "none", borderRadius: 6, cursor: "pointer", background: activeLens === k ? v.color : v.bg, color: activeLens === k ? "white" : v.textColor }}>{v.name}</button>
              ))}
            </div>
          </div>
          {activeLens && (

    // =============================================
    // LANDING PAGE
    // =============================================
    const LandingPage = ({ currentSession, onStart, onContinue, onOpenSession, onImport }) => {
      const { t, lang, setLang } = useLang();

      const [selectedTemplate, setSelectedTemplate] = useState("blank");

      const templates = getTemplates(lang);

      const scenarios = [
        { id: "blank", icon: "○", name: t.scenarioBlank, desc: t.scenarioBlankDesc },

        { id: "alignment", icon: "◑", name: t.scenarioAlignment, desc: t.scenarioAlignmentDesc },

      const selectedTemplateData = templates[selectedTemplate];

      return (
        <div style={{ minHeight: "100vh" }}>

              <LangToggle lang={lang} setLang={setLang} />
            </div>
          </header>
          <section style={{ paddingTop: 100, paddingBottom: 48, textAlign: "center", padding: "100px 20px 48px" }}>
            <div style={{ maxWidth: 680, margin: "0 auto" }}>
              <div className="animate-in" style={{ marginBottom: 20 }}><div className="animate-float" style={{ width: 56, height: 56, borderRadius: 14, background: "var(--accent)", color: "white", display: "inline-flex", alignItems: "center", justifyContent: "center", fontSize: "1.5rem", boxShadow: "var(--shadow-lg)" }}>◐</div></div>

              <div className="animate-in delay-3" style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
                <button onClick={() => onStart(selectedTemplate)} className="btn btn-primary btn-large">{t.startSession} {Icon.arrow}</button>
                {currentSession && currentSession.title && <button onClick={onContinue} className="btn btn-secondary btn-large">{t.continueSession}</button>}
              </div>
            </div>
          </section>
          {currentSession && currentSession.title && (
            <section style={{ padding: "0 20px 40px" }}>
              <div style={{ maxWidth: 520, margin: "0 auto" }}>
                <div className="card animate-in" style={{ padding: 18, border: "2px solid var(--green)", cursor: "pointer" }} onClick={onContinue}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", gap: 16 }}><div><div style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--green-text)", textTransform: "uppercase", marginBottom: 4 }}>In progress</div><div style={{ fontWeight: 600, fontSize: "1.0625rem", marginBottom: 2 }}>{currentSession.title}</div><div style={{ fontSize: "0.875rem", color: "var(--text-muted)" }}>{currentSession.date} · {currentSession.topics?.length || 0} {t.topics}</div></div><div style={{ color: "var(--green)" }}>{Icon.arrow}</div></div>
                </div>
              </div>
            </section>
          )}
          <section style={{ padding: "48px 20px", background: "var(--bg-card)" }}><div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center" }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 16 }}>{t.youKnowThis}</h2><p style={{ fontSize: "1.0625rem", color: "var(--text-secondary)", lineHeight: 1.6 }}>{t.youKnowThisDesc}</p></div></section>
          <section style={{ padding: "48px 20px" }}><div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center" }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 16 }}>{t.whatRoomDoes}</h2><p style={{ fontSize: "1.0625rem", color: "var(--text-secondary)", lineHeight: 1.6 }}>{t.roomPurpose}</p></div></section>
          <section style={{ padding: "48px 20px", background: "var(--bg-card)" }}>
            <div style={{ maxWidth: 800, margin: "0 auto" }}>
              <div style={{ textAlign: "center", marginBottom: 32 }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 10 }}>{t.forFacilitators}</h2><p style={{ color: "var(--text-secondary)", fontSize: "1.0625rem" }}>{t.forFacilitatorsDesc}</p></div>
              <div style={{ textAlign: "center", marginBottom: 20 }}><span style={{ fontSize: "0.75rem", fontWeight: 600, color: "var(--text-muted)", textTransform: "uppercase", letterSpacing: "0.05em" }}>{t.whatYouGet}</span></div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(260px, 1fr))", gap: 18 }} className="mobile-grid-1">
                {[{ bg: "var(--blue-soft)", color: "var(--blue-text)", title: t.feature1Title, desc: t.feature1Desc }, { bg: "var(--purple-soft)", color: "var(--purple-text)", title: t.feature2Title, desc: t.feature2Desc }, { bg: "var(--green-soft)", color: "var(--green-text)", title: t.feature3Title, desc: t.feature3Desc }].map((f, i) => (<div key={i} style={{ padding: 22, background: f.bg, borderRadius: "var(--radius-lg)" }}><h3 style={{ fontWeight: 600, marginBottom: 10, color: f.color, fontSize: "1.0625rem" }}>{f.title}</h3><p style={{ color: "var(--text-secondary)", fontSize: "1rem", lineHeight: 1.5 }}>{f.desc}</p></div>))}

          </section>
          <section style={{ padding: "48px 20px" }}><div style={{ maxWidth: 600, margin: "0 auto", textAlign: "center" }}><h2 className="font-serif" style={{ fontSize: "1.5rem", marginBottom: 14 }}>{t.grounded}</h2><p style={{ color: "var(--text-secondary)", lineHeight: 1.6, marginBottom: 14, fontSize: "1rem" }}>{t.groundedDesc}</p><p style={{ fontSize: "0.75rem", color: "var(--text-muted)", letterSpacing: "0.02em" }}>{t.researchCredits}</p></div></section>

              </div>
              {selectedTemplate !== "blank" && selectedTemplateData && (
