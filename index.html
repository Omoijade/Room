<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>The Room</title>
  <meta name="description" content="A facilitation surface for decisions that stick." />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9680;</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #F5F5F7; --bg-card: #FFFFFF; --bg-secondary: #FAFAFA; --bg-dark: #1D1D1F;
      --accent: #1D1D1F; --accent-soft: #E8E8ED;
      --text: #1D1D1F; --text-secondary: #5A5A5F; --text-muted: #76767B; --text-on-dark: #F5F5F7;
      --border: #D2D2D7; --border-light: #E8E8ED;
      --green: #34C759; --green-soft: #E8FAE8; --green-text: #248A3D;
      --blue: #007AFF; --blue-soft: #E5F2FF; --blue-text: #0055D4;
      --purple: #AF52DE; --purple-soft: #F5E6FA; --purple-text: #8944AB;
      --orange: #FF9500; --orange-soft: #FFF4E5; --orange-text: #C45D00;
      --yellow: #FFCC00; --yellow-soft: #FFF9E5; --yellow-text: #996600;
      --red: #FF3B30; --red-soft: #FFE5E5; --red-text: #D70015;
      --radius: 12px; --radius-lg: 16px; --radius-xl: 20px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.06);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
      --touch-target: 44px;
    }
    [data-theme="dark"] {
      --bg: #000000; --bg-card: #1C1C1E; --bg-secondary: #2C2C2E; --bg-dark: #000000;
      --accent: #F5F5F7; --accent-soft: #3A3A3C;
      --text: #F5F5F7; --text-secondary: #C7C7CC; --text-muted: #98989D; --text-on-dark: #F5F5F7;
      --border: #38383A; --border-light: #2C2C2E;
      --green-soft: #18301E; --green-text: #4ED96A;
      --blue-soft: #11243B; --blue-text: #5AA9FF;
      --purple-soft: #2A1B33; --purple-text: #CB8CE6;
      --orange-soft: #33240E; --orange-text: #FFB03A;
      --red-soft: #3A1513; --red-text: #FF6961;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.4);
      --shadow: 0 2px 8px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.5);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
    }
    [data-theme="dark"] .btn-primary { color: #1D1D1F; }
    [data-theme="dark"] .btn-primary:hover:enabled { background: #fff; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 18px; scroll-behavior: smooth; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: var(--bg); color: var(--text); min-height: 100vh;
      -webkit-font-smoothing: antialiased; line-height: 1.5; letter-spacing: -0.022em;
      -webkit-tap-highlight-color: transparent;
    }
    .font-serif { font-family: "DM Serif Display", "New York", Georgia, serif; letter-spacing: -0.01em; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes saveFlash { 0% { opacity: 0; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } 100% { opacity: 0; transform: scale(0.9); } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeIn 0.5s ease, slideUp 0.5s ease; animation-fill-mode: both; }
    .animate-fade { animation: fadeIn 0.25s ease; }
    .animate-scale { animation: scaleIn 0.2s ease; }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-pulse { animation: pulse 1.5s ease infinite; }
    .animate-save { animation: saveFlash 1.5s ease; }
    .animate-dropdown { animation: slideDown 0.2s ease; }
    .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.2s; } .delay-3 { animation-delay: 0.3s; }
    *:focus-visible { outline: 3px solid var(--blue); outline-offset: 2px; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; scroll-behavior: auto !important; }
    }

    @media print {
      .no-print { display: none !important; }
      body { background: white; font-size: 12pt; }
      .card { box-shadow: none; border: 1px solid #ddd; break-inside: avoid; }
      .print-break { page-break-before: always; }
    }

    @media (max-width: 768px) {
      html { font-size: 16px; }
      .desktop-only { display: none !important; }
      .mobile-stack { flex-direction: column !important; }
      .mobile-full { width: 100% !important; min-width: 0 !important; }
      .mobile-grid-1 { grid-template-columns: 1fr !important; }
      .mobile-grid-2 { grid-template-columns: repeat(2, 1fr) !important; }
      .room-layout { display: flex !important; flex-direction: column !important; }
      .room-sidebar { width: 100% !important; margin-top: 16px; }
      .room-main { order: 2; }
      .mobile-timer-section { order: 1; margin-bottom: 16px; }
      .mobile-show { display: flex !important; }
      .mobile-p-sm { padding: 14px !important; }
    }
    @media (min-width: 769px) {
      .mobile-only { display: none !important; }
    }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: inherit; font-weight: 600; border-radius: var(--radius); cursor: pointer;
      border: none; transition: all 0.2s ease; letter-spacing: -0.01em;
      min-height: var(--touch-target);
    }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.4; cursor: default; transform: none; }
    .btn-primary { background: var(--accent); color: white; padding: 14px 28px; font-size: 1rem; }
    .btn-primary:hover:enabled { background: #000; transform: translateY(-1px); box-shadow: var(--shadow-lg); }
    .btn-secondary { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); padding: 12px 20px; font-size: 1rem; }
    .btn-secondary:hover:enabled { background: var(--bg-secondary); border-color: var(--text-muted); }
    .btn-ghost { background: transparent; color: var(--text-secondary); padding: 10px 16px; font-size: 0.9375rem; }
    .btn-ghost:hover { background: var(--accent-soft); color: var(--text); }
    .btn-small { padding: 10px 16px; font-size: 0.875rem; border-radius: 8px; min-height: 40px; }
    .btn-icon { padding: 10px; border-radius: 8px; min-width: var(--touch-target); }
    .btn-large { padding: 18px 36px; font-size: 1.0625rem; border-radius: var(--radius-lg); }

    .input {
      width: 100%; padding: 14px 16px; border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 1rem; background: var(--bg-card); color: var(--text); transition: all 0.15s;
      min-height: var(--touch-target);
    }
    .input::placeholder { color: var(--text-muted); }
    .input:focus { border-color: var(--blue); outline: none; box-shadow: 0 0 0 3px var(--blue-soft); }
    .input-small { padding: 12px 14px; font-size: 0.9375rem; }

    .textarea-auto {
      width: 100%; min-height: 60px; padding: 16px; border: none; border-radius: var(--radius);
      font-family: inherit; font-size: inherit; line-height: 1.5; background: transparent;
      color: var(--text); resize: none; overflow: hidden;
    }
    .textarea-auto:focus { outline: none; }
    .textarea-auto::placeholder { color: var(--text-muted); }

    .card { background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow); overflow: hidden; }
    .progress-bar { height: 6px; background: var(--border-light); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 3px; transition: width 0.3s ease; }

    .intention-banner {
      background: linear-gradient(135deg, var(--blue-soft) 0%, var(--purple-soft) 100%);
      border: 1px solid var(--border-light); border-radius: var(--radius);
      padding: 14px 18px; display: flex; align-items: center; gap: 12px;
    }

    .lang-toggle { display: flex; align-items: center; gap: 4px; padding: 4px; background: var(--bg-secondary); border-radius: 8px; font-size: 0.875rem; }
    .lang-toggle button { padding: 8px 12px; border: none; background: transparent; cursor: pointer; border-radius: 6px; font-weight: 500; color: var(--text-muted); transition: all 0.15s; font-family: inherit; min-height: 36px; }
    .lang-toggle button.active { background: var(--bg-card); color: var(--text); box-shadow: var(--shadow-sm); }

    .topic-row { display: flex; align-items: center; gap: 10px; padding: 14px; background: var(--bg-secondary); border-radius: 10px; transition: all 0.15s; min-height: var(--touch-target); flex-wrap: wrap; }
    .topic-row:hover { background: var(--accent-soft); }

    .aob-box { background: var(--purple-soft); border: 1px solid var(--purple); border-radius: var(--radius); padding: 18px; }

    .checkbox { width: 26px; height: 26px; border: 2px solid var(--border); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; background: var(--bg-card); padding: 0; }
    .checkbox.checked { background: var(--green); border-color: var(--green); color: white; }
    .checkbox:hover { border-color: var(--green); }

    .session-card { padding: 18px; border: 1px solid var(--border-light); border-radius: var(--radius); transition: all 0.2s; cursor: pointer; background: var(--bg-card); min-height: var(--touch-target); width: 100%; text-align: left; font-family: inherit; color: var(--text); }
    .session-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateY(-2px); }

    .template-card { padding: 16px; border: 2px solid var(--border-light); border-radius: var(--radius-lg); transition: all 0.2s; cursor: pointer; text-align: left; background: var(--bg-card); width: 100%; font-family: inherit; color: var(--text); }
    .template-card:hover { border-color: var(--accent); background: var(--bg-secondary); }
    .template-card.selected { border-color: var(--accent); background: var(--accent-soft); }

    .tip-box { padding: 16px 18px; background: var(--blue-soft); border-radius: var(--radius); font-size: 0.9375rem; color: var(--blue-text); line-height: 1.5; }

    .save-indicator { position: fixed; bottom: 20px; right: 20px; padding: 12px 18px; background: var(--green); color: white; border-radius: var(--radius); font-size: 0.9375rem; font-weight: 500; display: flex; align-items: center; gap: 8px; z-index: 100; }

    .mobile-nav { position: relative; }
    .mobile-nav-dropdown { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); z-index: 50; margin-top: 4px; overflow: hidden; min-width: 200px; }
    .mobile-nav-item { display: flex; align-items: center; justify-content: space-between; padding: 16px 18px; border-bottom: 1px solid var(--border-light); cursor: pointer; font-weight: 500; min-height: var(--touch-target); font-size: 1rem; width: 100%; background: transparent; border-left: none; border-right: none; border-top: none; font-family: inherit; color: var(--text); }
    .mobile-nav-item:last-child { border-bottom: none; }
    .mobile-nav-item:hover { background: var(--bg-secondary); }
    .mobile-nav-item.active { background: var(--accent-soft); color: var(--accent); }
    .mobile-nav-item.disabled { opacity: 0.4; cursor: default; }

    .timer-display { font-family: ui-monospace, monospace; font-variant-numeric: tabular-nums; }
    .timer-overtime { color: var(--red-text); }

    .template-preview { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border-light); }
    .template-topic { display: flex; align-items: center; gap: 10px; padding: 8px 0; font-size: 0.9375rem; color: var(--text-secondary); }
    .template-topic-num { width: 20px; height: 20px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-size: 0.6875rem; font-weight: 600; flex-shrink: 0; }

    .sidebar-topic-text { font-size: 0.875rem; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; hyphens: auto; }

    .participant-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg-secondary); border-radius: 20px; font-size: 0.875rem; border: none; font-family: inherit; color: var(--text); }
    .participant-chip.present { background: var(--green-soft); color: var(--green-text); }
    .participant-chip.absent { background: var(--bg-secondary); color: var(--text-muted); }

    .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100; display: flex; align-items: flex-start; justify-content: center; padding: max(20px, 4vh) 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }

    .mini-mode-container {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      background: var(--bg); padding: 16px; height: 100%; display: flex; flex-direction: column;
      font-size: 14px; color: var(--text);
    }
    .mini-mode-container * { box-sizing: border-box; }
  </style>
